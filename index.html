<style>
:root {
  --bg: #0A0A0A;
  --surface: #0F0F0F;
  --card: #141414;
  --card-2: #1A1A1A;
  --line: #242424;
  --line-2: #2E2E2E;
  --text: #F1F1F1;
  --muted: #8A8A8A;
  --dim: #5A5A5A;
  --accent: #E63946;
  --accent-ink: #FF5461;
  --ok: #7BC96F;
  --warn: #E8B547;
  --danger: #E63946;
  --info: #6BA3E0;
  --font-display: 'Archivo', system-ui, sans-serif;
  --font-body: 'Inter', system-ui, sans-serif;
  --font-mono: 'IBM Plex Mono', ui-monospace, monospace;
  --row-h: 40px;
}

* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; background: var(--bg); color: var(--text); font-family: var(--font-body); font-size: 14px; -webkit-font-smoothing: antialiased; }
body { min-height: 100vh; overflow: hidden; }

button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }
input, select, textarea { font-family: inherit; color: inherit; }

.mono { font-family: var(--font-mono); font-feature-settings: 'ss01'; }
.display { font-family: var(--font-display); font-weight: 800; letter-spacing: -0.02em; }
.narrow { font-family: 'Archivo Narrow', var(--font-display); font-weight: 700; }

/* ===================== SHELL ===================== */
.app {
  display: grid;
  grid-template-columns: 224px 1fr;
  height: 100vh;
}
.app.collapsed { grid-template-columns: 64px 1fr; }

/* ============ SIDEBAR ============ */
.sidebar {
  background: #060606;
  border-right: 1px solid var(--line);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
.sidebar-brand {
  padding: 18px 18px 14px;
  border-bottom: 1px solid var(--line);
  display: flex;
  align-items: center;
  gap: 10px;
}
.wordmark {
  font-family: var(--font-display);
  font-weight: 900;
  font-size: 22px;
  letter-spacing: -0.02em;
  line-height: 1;
  display: flex;
  align-items: baseline;
  gap: 2px;
}
.wordmark .dot { color: var(--accent); }
.sidebar-sub {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--muted);
  letter-spacing: 0.12em;
  text-transform: uppercase;
  margin-top: 4px;
}
.sidebar-section {
  padding: 16px 14px 6px;
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.14em;
  color: var(--dim);
  text-transform: uppercase;
}
.nav {
  padding: 4px 8px;
  display: flex;
  flex-direction: column;
  gap: 2px;
}
.nav-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px 10px;
  border-radius: 2px;
  color: var(--muted);
  font-weight: 500;
  font-size: 13px;
  text-align: left;
  letter-spacing: 0.01em;
  position: relative;
}
.nav-item:hover { background: #111; color: var(--text); }
.nav-item.active { background: #141414; color: var(--text); }
.nav-item.active::before {
  content: ""; position: absolute; left: 0; top: 8px; bottom: 8px; width: 2px; background: var(--accent);
}
.nav-item .num {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--dim);
  margin-left: auto;
}
.nav-item.active .num { color: var(--accent); }

.sidebar-footer {
  margin-top: auto;
  padding: 12px;
  border-top: 1px solid var(--line);
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--dim);
  letter-spacing: 0.08em;
}
.status-dot { display: inline-block; width: 6px; height: 6px; background: var(--ok); margin-right: 6px; vertical-align: middle; border-radius: 50%; box-shadow: 0 0 6px var(--ok); }

/* ============ MAIN AREA ============ */
.main {
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
.topbar {
  height: 52px;
  border-bottom: 1px solid var(--line);
  display: flex;
  align-items: center;
  padding: 0 20px;
  gap: 16px;
  flex-shrink: 0;
  background: var(--bg);
}
.breadcrumb {
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 0.1em;
  color: var(--muted);
  text-transform: uppercase;
}
.breadcrumb .sep { color: var(--dim); margin: 0 8px; }
.breadcrumb .cur { color: var(--text); }
.topbar-right { margin-left: auto; display: flex; align-items: center; gap: 18px; }
.chip {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 6px 10px;
  border: 1px solid var(--line);
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--muted);
}
.chip .v { color: var(--text); }

.content {
  flex: 1;
  overflow: auto;
  padding: 24px;
}
.content::-webkit-scrollbar { width: 10px; height: 10px; }
.content::-webkit-scrollbar-track { background: transparent; }
.content::-webkit-scrollbar-thumb { background: #222; border: 2px solid var(--bg); }

/* ============ PAGE HEADER ============ */
.page-head {
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  gap: 24px;
  padding-bottom: 20px;
  margin-bottom: 20px;
  border-bottom: 1px solid var(--line);
}
.page-title {
  font-family: var(--font-display);
  font-weight: 900;
  font-size: 42px;
  line-height: 0.95;
  letter-spacing: -0.03em;
}
.page-kicker {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 8px;
}
.page-desc {
  color: var(--muted);
  font-size: 13px;
  max-width: 440px;
}

/* ============ PANEL ============ */
.panel {
  background: var(--card);
  border: 1px solid var(--line);
  position: relative;
}
.panel-head {
  padding: 14px 16px;
  border-bottom: 1px solid var(--line);
  display: flex;
  align-items: center;
  gap: 12px;
}
.panel-title {
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--text);
}
.panel-title .dim { color: var(--muted); }
.panel-body { padding: 16px; }
.panel-footer { padding: 12px 16px; border-top: 1px solid var(--line); display: flex; align-items: center; gap: 12px; }

/* crop marks */
.crop .panel-head::before,
.crop .panel-head::after,
.crop::before,
.crop::after {
  content: ""; position: absolute; width: 8px; height: 8px; border: 1px solid var(--line-2);
  pointer-events: none;
}
.crop::before { top: -1px; left: -1px; border-right: 0; border-bottom: 0; }
.crop::after { top: -1px; right: -1px; border-left: 0; border-bottom: 0; }

/* ============ BUTTONS ============ */
.btn {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 10px 14px;
  border: 1px solid var(--line-2);
  background: transparent;
  color: var(--text);
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  font-weight: 500;
  transition: all 0.12s ease;
}
.btn:hover { border-color: var(--text); background: #191919; }
.btn.primary { background: var(--accent); border-color: var(--accent); color: #0A0A0A; font-weight: 700; }
.btn.primary:hover { background: var(--accent-ink); border-color: var(--accent-ink); }
.btn.ghost { border-color: transparent; color: var(--muted); }
.btn.ghost:hover { color: var(--text); background: #151515; border-color: var(--line); }
.btn.sm { padding: 6px 10px; font-size: 10px; letter-spacing: 0.1em; }
.btn:disabled { opacity: 0.4; cursor: not-allowed; }

/* ============ FORM ============ */
.field { display: flex; flex-direction: column; gap: 6px; }
.field label {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--muted);
}
.field .req { color: var(--accent); }
.input, .select, .textarea {
  background: #0B0B0B;
  border: 1px solid var(--line);
  padding: 11px 12px;
  color: var(--text);
  font-size: 13px;
  outline: none;
  transition: border-color 0.1s;
  width: 100%;
  border-radius: 0;
}
.input:focus, .select:focus, .textarea:focus { border-color: var(--accent); }
.input::placeholder { color: var(--dim); }
.select option, select option { background: #1A1A1A; color: #E0E0E0; }

.segmented {
  display: inline-flex;
  border: 1px solid var(--line-2);
}
.segmented button {
  padding: 8px 14px;
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--muted);
  border-right: 1px solid var(--line-2);
}
.segmented button:last-child { border-right: 0; }
.segmented button:hover { color: var(--text); }
.segmented button.on { background: var(--text); color: var(--bg); font-weight: 600; }

/* ============ TABLE ============ */
.tbl { width: 100%; border-collapse: collapse; font-size: 13px; }
.tbl thead th {
  text-align: left;
  padding: 10px 14px;
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--muted);
  font-weight: 500;
  border-bottom: 1px solid var(--line);
  background: #0C0C0C;
  white-space: nowrap;
}
.tbl tbody td {
  padding: 12px 14px;
  border-bottom: 1px solid var(--line);
  vertical-align: middle;
}
.tbl tbody tr { transition: background 0.08s; cursor: pointer; }
.tbl tbody tr:hover { background: #121212; }
.tbl tbody tr.selected { background: #161616; }
.tbl tbody tr.selected td:first-child { box-shadow: inset 2px 0 0 var(--accent); }
.tbl .num { font-family: var(--font-mono); text-align: right; }
.tbl .order-n { font-family: var(--font-mono); font-weight: 600; color: var(--text); }

/* ============ BADGES / STATUS ============ */
.badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 3px 8px;
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  font-weight: 500;
  border: 1px solid var(--line-2);
  color: var(--muted);
  white-space: nowrap;
}
.badge .pip { width: 6px; height: 6px; background: var(--muted); }
.badge.sin-empezar { color: #888; border-color: #333; }
.badge.sin-empezar .pip { background: #888; }
.badge.impresas { color: #E8B547; border-color: #5c4516; }
.badge.impresas .pip { background: #E8B547; }
.badge.preparado { color: #6BA3E0; border-color: #2a4660; }
.badge.preparado .pip { background: #6BA3E0; }
.badge.enviado { color: #B37BE0; border-color: #4a3260; }
.badge.enviado .pip { background: #B37BE0; }
.badge.recibido { color: #7BC96F; border-color: #2e5228; }
.badge.recibido .pip { background: #7BC96F; }
.badge.rebotado { color: #E63946; border-color: #5a1f25; }
.badge.rebotado .pip { background: #E63946; }
.badge.perdido { color: #555; border-color: #2a2a2a; }
.badge.perdido .pip { background: #555; }

.pay {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--muted);
}
.pay.paid { color: var(--ok); }
.pay.pending { color: var(--warn); }

/* ============ KPI ============ */
.kpi-grid {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 1px;
  background: var(--line);
  border: 1px solid var(--line);
  margin-bottom: 24px;
}
.kpi {
  background: var(--card);
  padding: 18px 18px 22px;
  position: relative;
}
.kpi .label {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 10px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.kpi .label .idx { color: var(--dim); }
.kpi .value {
  font-family: var(--font-display);
  font-weight: 800;
  font-size: 38px;
  line-height: 1;
  letter-spacing: -0.03em;
  display: flex;
  align-items: baseline;
  gap: 6px;
}
.kpi .unit {
  font-family: var(--font-mono);
  font-size: 12px;
  color: var(--muted);
  font-weight: 400;
  letter-spacing: 0.04em;
}
.kpi .delta {
  margin-top: 10px;
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--ok);
  display: flex;
  align-items: center;
  gap: 6px;
}
.kpi .delta.neg { color: var(--danger); }
.kpi.accent { background: var(--accent); color: #0A0A0A; }
.kpi.accent .label, .kpi.accent .unit, .kpi.accent .delta { color: rgba(10,10,10,0.7); }

/* ============ STEPPER ============ */
.stepper {
  display: flex;
  gap: 0;
  margin-bottom: 24px;
  border: 1px solid var(--line);
}
.step {
  flex: 1;
  padding: 14px 18px;
  border-right: 1px solid var(--line);
  display: flex;
  align-items: center;
  gap: 12px;
  background: var(--surface);
  position: relative;
}
.step:last-child { border-right: 0; }
.step .n {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--dim);
  letter-spacing: 0.1em;
  width: 24px;
}
.step .t {
  font-family: var(--font-display);
  font-weight: 700;
  font-size: 13px;
  letter-spacing: 0.02em;
  color: var(--muted);
  text-transform: uppercase;
}
.step.active { background: var(--card); }
.step.active::after {
  content: ""; position: absolute; left: 0; right: 0; top: -1px; height: 2px; background: var(--accent);
}
.step.active .n { color: var(--accent); }
.step.active .t { color: var(--text); }
.step.done .n { color: var(--ok); }
.step.done .t { color: var(--muted); }

/* ============ CHART ============ */
.bar-chart { display: flex; align-items: flex-end; gap: 8px; height: 220px; padding: 16px 4px 0; }
.bar-col { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 6px; }
.bar-col .bar-wrap { flex: 1; width: 100%; display: flex; flex-direction: column; justify-content: flex-end; }
.bar-col .bar {
  background: var(--accent);
  width: 100%;
  min-height: 4px;
  position: relative;
  transition: background 0.1s;
}
.bar-col .bar.ghost { background: #242424; }
.bar-col .bar.ghost + .v { color: var(--dim); }
.bar-col:hover .bar { background: var(--accent-ink); }
.bar-col .v {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--text);
  font-weight: 500;
}
.bar-col .lbl {
  font-family: var(--font-mono);
  font-size: 9px;
  letter-spacing: 0.1em;
  color: var(--muted);
  text-transform: uppercase;
}

/* ============ COLOR/SIZE PICKERS ============ */
.color-swatch-row { display: flex; gap: 12px; flex-wrap: wrap; }
.color-swatch {
  border: 1px solid var(--line);
  padding: 14px 16px;
  display: flex;
  flex-direction: column;
  gap: 8px;
  min-width: 160px;
  cursor: pointer;
  background: var(--surface);
  transition: all 0.12s;
  position: relative;
}
.color-swatch:hover { border-color: var(--text); }
.color-swatch.on { border-color: var(--accent); background: var(--card); }
.color-swatch.on::after {
  content: "✓"; position: absolute; top: 8px; right: 10px; color: var(--accent);
  font-family: var(--font-mono); font-size: 14px;
}
.color-swatch .chip-c {
  width: 44px; height: 44px; border: 1px solid var(--line-2);
}
.color-swatch .name {
  font-family: var(--font-display); font-weight: 700; font-size: 15px; letter-spacing: -0.01em;
}
.color-swatch .cost {
  font-family: var(--font-mono); font-size: 11px; color: var(--muted);
}

.size-row { display: flex; gap: 8px; }
.size-btn {
  width: 60px; height: 56px;
  border: 1px solid var(--line-2);
  background: var(--surface);
  font-family: var(--font-display);
  font-weight: 800;
  font-size: 20px;
  color: var(--text);
  transition: all 0.1s;
}
.size-btn:hover { border-color: var(--text); }
.size-btn.on { background: var(--accent); border-color: var(--accent); color: #0A0A0A; }

.catalog-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(168px, 1fr));
  gap: 12px;
}
.catalog-card {
  border: 1px solid var(--line);
  background: var(--surface);
  padding: 10px;
  cursor: pointer;
  transition: all 0.12s;
  position: relative;
}
.catalog-card:hover { border-color: var(--line-2); background: var(--card); }
.catalog-card.on { border-color: var(--accent); }
.catalog-card.on::after {
  content: ""; position: absolute; inset: 0; border: 1px solid var(--accent); pointer-events: none;
}
.thumb {
  aspect-ratio: 1;
  background: #0B0B0B;
  display: flex; align-items: center; justify-content: center;
  margin-bottom: 10px;
  overflow: hidden;
  position: relative;
}
.catalog-card .nm {
  font-family: var(--font-display);
  font-weight: 700;
  font-size: 12px;
  letter-spacing: -0.005em;
  display: flex; justify-content: space-between; align-items: baseline;
}
.catalog-card .cat-cost {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--muted);
  margin-top: 3px;
}
.sku-tag {
  font-family: var(--font-mono);
  font-size: 9px;
  color: var(--dim);
  letter-spacing: 0.08em;
}

/* ============ LINE ITEM LIST ============ */
.line-item {
  display: grid;
  grid-template-columns: 48px 1fr auto auto;
  gap: 14px;
  align-items: center;
  padding: 12px 14px;
  border: 1px solid var(--line);
  background: var(--surface);
  margin-bottom: 6px;
}
.line-item .idx {
  font-family: var(--font-mono); font-size: 11px; color: var(--dim); letter-spacing: 0.08em;
}
.line-item .info { display: flex; flex-direction: column; gap: 3px; }
.line-item .pname { font-family: var(--font-display); font-weight: 700; font-size: 14px; }
.line-item .pdetails {
  font-family: var(--font-mono); font-size: 10px; color: var(--muted); letter-spacing: 0.06em;
  text-transform: uppercase;
}
.line-item .cost-breakdown {
  font-family: var(--font-mono);
  font-size: 11px;
  text-align: right;
  color: var(--muted);
}
.line-item .cost-breakdown .total { display: block; color: var(--text); font-weight: 600; font-size: 13px; margin-top: 2px; }

/* summary box */
.summary-row {
  display: flex; justify-content: space-between; padding: 8px 0;
  font-family: var(--font-mono); font-size: 12px;
}
.summary-row.big {
  font-family: var(--font-display); font-weight: 800; font-size: 28px; letter-spacing: -0.02em;
  padding: 14px 0; border-top: 1px solid var(--line); margin-top: 8px;
}
.summary-row.big .r { font-family: var(--font-mono); }
.summary-row .l { color: var(--muted); text-transform: uppercase; letter-spacing: 0.1em; font-size: 10px; align-self: center; }
.summary-row.big .l { color: var(--text); font-family: var(--font-display); font-size: 13px; letter-spacing: 0.04em; }
.summary-row .r { color: var(--text); }
.summary-row.positive .r { color: var(--ok); }

/* ORDER NUMBER BIG */
.order-hero {
  border: 1px solid var(--accent);
  padding: 30px 32px;
  background: #110808;
  display: flex;
  justify-content: space-between;
  align-items: flex-end;
  position: relative;
  overflow: hidden;
}
.order-hero::before {
  content: "ORDER"; position: absolute; top: -24px; left: -12px;
  font-family: var(--font-display); font-weight: 900;

function CatThumb({ id, size = 'lg' }) {
  // Generate a deterministic graphic per id — no hand-drawn illustrations, pure geometry
  const seed = id.split('').reduce((a, c) => a + c.charCodeAt(0), 0);
  const hue = (seed * 47) % 360;
  const variant = seed % 6;
  const accent = `oklch(0.62 0.18 ${hue})`;
  const mid = `oklch(0.38 0.09 ${hue})`;
  const dk = `#0B0B0B`;

  const renderGraphic = () => {
    switch (variant) {
      case 0:
        return (
          <>
            <rect x="0" y="0" width="100" height="100" fill={dk} />
            <circle cx="50" cy="50" r="34" stroke={accent} strokeWidth="3" fill="none" />

            <polygon points="20,80 50,20 80,80" fill="none" stroke={accent} strokeWidth="3" />
            <line x1="20" y1="80" x2="80" y2="80" stroke={mid} strokeWidth="2" />

          </>
        );
      case 3:
        return (
          <>
            <rect x="0" y="0" width="100" height="100" fill={dk} />
            {[20, 40, 60, 80].map(y => <line key={y} x1="10" y1={y} x2="90" y2={y} stroke={accent} strokeWidth="1" />)}

<script type="text/babel">
// Shared UI primitives
const { useState, useEffect, useRef, useMemo } = React;

function Icon({ name, size = 16 }) {
  const common = { width: size, height: size, viewBox: '0 0 24 24', fill: 'none', stroke: 'currentColor', strokeWidth: 1.8, strokeLinecap: 'square', strokeLinejoin: 'miter' };

    case 'list':      return <svg {...common}><path d="M8 6h13M8 12h13M8 18h13M3 6h.01M3 12h.01M3 18h.01"/></svg>;
    case 'box':       return <svg {...common}><path d="M3 7l9-4 9 4-9 4-9-4zM3 7v10l9 4 9-4V7M12 11v10"/></svg>;
    case 'chart':     return <svg {...common}><path d="M3 3v18h18M7 14v4M12 9v9M17 5v13"/></svg>;
    case 'search':    return <svg {...common}><circle cx="11" cy="11" r="7"/><path d="M21 21l-5-5"/></svg>;
    case 'filter':    return <svg {...common}><path d="M3 5h18l-7 8v6l-4 2v-8L3 5z"/></svg>;
    case 'edit':      return <svg {...common}><path d="M11 4H4v16h16v-7M18 3l3 3-11 11H7v-3L18 3z"/></svg>;
    case 'sliders':   return <svg {...common}><path d="M4 21v-7M4 10V3M12 21v-9M12 8V3M20 21v-5M20 12V3M1 14h6M9 8h6M17 16h6"/></svg>;
    case 'printer':   return <svg {...common}><path d="M6 9V2h12v7M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2M6 14h12v8H6z"/></svg>;
    case 'dl':        return <svg {...common}><path d="M12 3v14M6 11l6 6 6-6M4 21h16"/></svg>;
    case 'settings':  return <svg {...common}><circle cx="12" cy="12" r="3"/><path d="M19 12a7 7 0 0 0-.1-1.2l2-1.5-2-3.4-2.3.9a7 7 0 0 0-2-1.2L14 3h-4l-.6 2.6a7 7 0 0 0-2 1.2L5.1 6 3 9.3l2 1.5A7 7 0 0 0 5 12c0 .4 0 .8.1 1.2l-2 1.5 2 3.4 2.3-.9a7 7 0 0 0 2 1.2L10 21h4l.6-2.6a7 7 0 0 0 2-1.2l2.3.9 2-3.4-2-1.5c.1-.4.1-.8.1-1.2z"/></svg>;
    case 'fist':      return <svg width={size} height={size} viewBox="0 0 24 24" fill="currentColor"><rect x="4" y="9" width="16" height="9"/><rect x="6" y="7" width="3" height="4"/><rect x="10" y="7" width="3" height="4"/><rect x="14" y="7" width="3" height="4"/><rect x="3" y="13" width="2" height="3"/></svg>;
    case 'up':        return <svg {...common}><path d="M6 15l6-6 6 6"/></svg>;
    case 'down':      return <svg {...common}><path d="M6 9l6 6 6-6"/></svg>;
    case 'refresh':   return <svg {...common}><path d="M21 12a9 9 0 0 1-15 6.7L3 16M3 12a9 9 0 0 1 15-6.7L21 8M3 4v4h4M21 20v-4h-4"/></svg>;
    case 'user':      return <svg {...common}><circle cx="12" cy="8" r="4"/><path d="M4 21c0-4.4 3.6-8 8-8s8 3.6 8 8"/></svg>;
    case 'trash':     return <svg {...common}><path d="M4 7h16M10 11v6M14 11v6M6 7l1 13h10l1-13M9 7V4h6v3"/></svg>;
    case 'phone':     return <svg {...common}><path d="M22 16.9v3a2 2 0 0 1-2.2 2 19.8 19.8 0 0 1-8.6-3.1 19.5 19.5 0 0 1-6-6 19.8 19.8 0 0 1-3.1-8.7A2 2 0 0 1 4.1 2h3a2 2 0 0 1 2 1.7l.7 3.2a2 2 0 0 1-.5 1.8L8 10a16 16 0 0 0 6 6l1.3-1.3a2 2 0 0 1 1.8-.5l3.2.7a2 2 0 0 1 1.7 2z"/></svg>;
    default: return null;
  }
}

function StatusBadge({ s }) {
  return (
    <span className={`badge ${s}`}>
      <span className="pip" /> {STATUS_LABELS[s]}
    </span>
  );
}

function PayBadge({ s }) {
  const pending = s.endsWith('-pending') || s === 'boxful-pending';
  const paid = !pending;
  return (
    <span className={`pay ${paid ? 'paid' : 'pending'}`}>
      {paid ? '●' : '○'} {PAY_STATUS_LABELS[s] || s}
    </span>
  );
}

// color dot for item rendering
function ColorDot({ id }) {
  const c = SHIRT_COLORS.find(x => x.id === id) || SHIRT_COLORS[0];
  return <span style={{ display: 'inline-block', width: 10, height: 10, background: c.hex, border: `1px solid ${c.border}`, marginRight: 4, verticalAlign: 'middle' }} />;
}

function fmtItems(items) {
  return items.map(i => `${i.d}/${i.s}`).join(' · ');
}

function sumOrderItems(order) {
  return order.items.reduce((a, i) => a + i.q, 0);
}

function Spark({ values, color = '#E63946' }) {
  const w = 80, h = 22;
  const max = Math.max(...values);
  const pts = values.map((v, i) => `${(i / (values.length - 1)) * w},${h - (v / max) * h}`).join(' ');
  return (
    <svg width={w} height={h} style={{ display: 'block' }}>
      <polyline points={pts} fill="none" stroke={color} strokeWidth="1.5" />
    </svg>
  );
}

Object.assign(window, { Icon, StatusBadge, PayBadge, ColorDot, fmtItems, sumOrderItems, Spark });

<script type="text/babel">
// Nueva Venta — multi-step flow
function NuevaVenta({ onOrderCreated, onReset, nextOrderNumber, clients = [], payConfig = PAY_CONFIG_DEFAULT, onClientCreated, prendas = PRENDAS, designs = CATALOG, dtfStock = DTF_STOCK }) {
  const [step, setStep] = useState(1);
  const [cliente, setCliente] = useState({ nombre: '', contacto: '', ciudad: '', canal: 'Instagram', direccion: '' });

  // Cart builder (step 2)
  const [pendingPrenda, setPendingPrenda] = useState(null);
  const [pendingColor, setPendingColor] = useState(null);
  const [pendingSize, setPendingSize] = useState(null);
  const [pendingDesign, setPendingDesign] = useState(null);
  const [items, setItems] = useState([]);

  const [payment, setPayment] = useState(null);
  const [precioTotal, setPrecioTotal] = useState('');

  const steps = [
    { n: '01', t: 'Cliente' },
    { n: '02', t: 'Piezas' },
    { n: '03', t: 'Pago' },
    { n: '04', t: 'Resumen' },
  ];

  const canProceed = {
    1: cliente.nombre.trim() && cliente.contacto.trim() && cliente.ciudad,
    2: items.length > 0,
    3: payment !== null,
    4: true,
  };

  const addItem = () => {
    if (!pendingPrenda || !pendingColor || !pendingSize || !pendingDesign) return;
    const p = prendas.find(x => x.id === pendingPrenda);
    const colorObj = p?.colors.find(c => (c.uid || c.id) === pendingColor || c.id === pendingColor);
    const shirtCost = colorObj?.cost ?? 215;
    const isNone = pendingDesign === '__none__';
    const d = isNone ? null : designs.find(x => x.id === pendingDesign);
    const dtfCost = isNone ? 0 : (d?.pricing?.[pendingSize]?.costo || d?.cost || 0);
    setItems(prev => [...prev, { id: crypto.randomUUID().slice(0, 6), p: pendingPrenda, c: pendingColor, s: pendingSize, d: pendingDesign, q: 1, shirtCost, dtfCost }]);
    setPendingDesign(null);
  };

  const removeItem = (id) => setItems(prev => prev.filter(i => i.id !== id));
  const updateItemQty = (id, delta) => setItems(prev => prev.map(i => i.id === id ? { ...i, q: Math.max(1, i.q + delta) } : i));

  const totals = useMemo(() => {
    const precio = Number(precioTotal) || 0;
    const inversion = items.reduce((a, i) => a + (i.shirtCost + i.dtfCost) * i.q, 0);
    const pm = payConfig.find(m => m.id === payment);
    const envio = pm && pm.envio > 0 ? pm.envio : 0;
    const comisionEst = pm && pm.comisionPct > 0 ? Math.round(precio * (pm.comisionPct / 100)) : 0;
    const ganancia = precio - inversion - envio - comisionEst;
    const margen = precio > 0 ? (ganancia / precio) * 100 : 0;
    return { inversion, envio, comisionEst, ganancia, margen, precio };
  }, [items, payment, payConfig, precioTotal]);

  return (
    <div>
      <div className="page-head">
        <div>
          <div className="page-kicker">MÓDULO · 01 / NUEVA VENTA</div>
          <div className="page-title">Nuevo pedido</div>
          <div className="page-desc">Registro de orden en 4 pasos. Los costos se calculan automáticamente a partir de la camiseta + DTF seleccionado.</div>
        </div>
        <div style={{ display: 'flex', gap: 10 }}>
          <span className="chip">CORRELATIVO <span className="v mono">#{nextOrderNumber}</span></span>
          <span className="chip">PIEZAS <span className="v mono">{items.length.toString().padStart(2, '0')}</span></span>
        </div>
      </div>

      <div className="stepper">
        {steps.map((s, idx) => (
          <div key={s.n} className={`step ${step === idx + 1 ? 'active' : step > idx + 1 ? 'done' : ''}`}>
            <div className="n mono">{s.n}</div>
            <div className="t">{s.t}</div>
          </div>
        ))}
      </div>

      {step === 1 && <Step1Cliente cliente={cliente} setCliente={setCliente} clients={clients} onClientCreated={onClientCreated} />}
      {step === 2 && (
        <Step2Piezas
          pendingPrenda={pendingPrenda} setPendingPrenda={(id) => { setPendingPrenda(id); setPendingColor(null); setPendingSize(null); }}
          pendingColor={pendingColor} setPendingColor={setPendingColor}
          pendingSize={pendingSize} setPendingSize={setPendingSize}
          pendingDesign={pendingDesign} setPendingDesign={setPendingDesign}
          addItem={addItem} items={items} removeItem={removeItem} updateItemQty={updateItemQty}
          prendas={prendas} designs={designs} dtfStock={dtfStock}
        />
      )}
      {step === 3 && (
        <Step3Pago payment={payment} setPayment={setPayment} totals={totals} payConfig={payConfig} precioTotal={precioTotal} setPrecioTotal={setPrecioTotal} items={items} prendas={prendas} designs={designs} />
      )}
      {step === 4 && (
        <Step4Resumen
          orderN={nextOrderNumber} cliente={cliente} items={items} payment={payment}
          totals={totals} payConfig={payConfig}
          onConfirm={() => {
            const pm = payConfig.find(m => m.id === payment);
            const payStatus = pm && pm.envio > 0 ? `${payment}-pending` : payment;
            onOrderCreated({
              n: nextOrderNumber, cliente: cliente.nombre, phone: cliente.contacto, ciudad: cliente.ciudad, canal: cliente.canal, direccion: cliente.direccion || '',
              items: items.map(i => ({ c: i.c, s: i.s, d: i.d, q: i.q })),
              pay: payment, total: totals.precio,
              estado: 'sin-empezar', payStatus,
              comision: totals.comisionEst, fecha: new Date().toISOString().slice(0,10),
            });
          }}
          onReset={onReset}
        />
      )}

      {step < 4 && (
        <div style={{ display: 'flex', justifyContent: 'space-between', marginTop: 24 }}>
          <button className="btn ghost" disabled={step === 1} onClick={() => setStep(s => s - 1)}>
            <Icon name="arrow-l" size={13} /> Volver
          </button>
          <button className="btn primary" disabled={!canProceed[step]} onClick={() => setStep(s => s + 1)}>
            Continuar <Icon name="arrow-r" size={13} />
          </button>
        </div>
      )}
    </div>
  );
}

function Step1Cliente({ cliente, setCliente, clients = [], onClientCreated }) {
  const [showMatches, setShowMatches] = useState(false);
  const [savedMsg, setSavedMsg] = useState(false);

  // Match by normalized phone digits
  const norm = (s) => (s || '').replace(/\D/g, '');
  const matches = cliente.contacto && norm(cliente.contacto).length >= 3
    ? clients.filter(c => norm(c.phone).includes(norm(cliente.contacto))).slice(0, 5)
    : [];

  const exact = clients.find(c => norm(c.phone) === norm(cliente.contacto));

  const applyClient = (c) => {
    setCliente(prev => ({
      ...prev,
      nombre: c.nombre,
      contacto: c.phone,
      ciudad: c.ciudad,
      canal: c.canal || prev.canal,
    }));
    setShowMatches(false);
  };

  return (
    <div className="panel crop">
      <div className="panel-head">
        <div className="panel-title">PASO 01 · <span className="dim">DATOS DEL CLIENTE</span></div>
        <div style={{ marginLeft: 'auto' }} className="mono" >
          <span className="dim" style={{ fontSize: 10, letterSpacing: '0.1em' }}>REQUERIDO ·</span>
          <span style={{ fontSize: 10, letterSpacing: '0.1em', color: 'var(--accent)', marginLeft: 6 }}>ID = TELÉFONO</span>
        </div>
      </div>
      <div className="panel-body" style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 16 }}>
        <div className="field" style={{ position: 'relative' }}>
          <label>
            Teléfono <span className="req">*</span>
            {exact && <span style={{ marginLeft: 8, fontSize: 9, color: 'var(--accent)', letterSpacing: '0.1em' }}>● CLIENTE EXISTENTE · RECOMPRA</span>}
          </label>
          <input
            className="input mono"
            placeholder="+504 9XXX-XXXX"
            value={cliente.contacto}
            onFocus={() => setShowMatches(true)}
            onBlur={() => setTimeout(() => setShowMatches(false), 180)}
            onChange={e => { setCliente(c => ({ ...c, contacto: e.target.value })); setShowMatches(true); }}
          />
          {showMatches && matches.length > 0 && !exact && (
            <div style={{ position: 'absolute', top: '100%', left: 0, right: 0, background: '#0F0F0F', border: '1px solid var(--accent)', zIndex: 50, marginTop: 4, maxHeight: 240, overflowY: 'auto', boxShadow: '0 12px 32px rgba(0,0,0,0.6)' }}>
              <div className="mono" style={{ fontSize: 9, letterSpacing: '0.14em', color: 'var(--accent)', padding: '6px 10px', borderBottom: '1px solid var(--line)', background: '#151515', textTransform: 'uppercase' }}>
                ▸ {matches.length} {matches.length === 1 ? 'coincidencia' : 'coincidencias'} · click para autocompletar
              </div>
              {matches.map(m => (
                <div
                  key={m.phone}
                  onMouseDown={() => applyClient(m)}
                  style={{ padding: '10px 12px', borderBottom: '1px solid var(--line)', cursor: 'pointer', display: 'flex', justifyContent: 'space-between', alignItems: 'center', gap: 10, background: '#0F0F0F' }}
                  onMouseEnter={e => e.currentTarget.style.background = '#1C1C1C'}
                  onMouseLeave={e => e.currentTarget.style.background = '#0F0F0F'}
                >
                  <div>
                    <div className="mono" style={{ fontSize: 11, fontWeight: 700, color: 'var(--text)' }}>{m.phone}</div>
                    <div style={{ fontSize: 12, marginTop: 3, color: 'var(--text)' }}>{m.nombre}</div>
                  </div>
                  <div className="mono" style={{ fontSize: 10, color: 'var(--muted)', textAlign: 'right', letterSpacing: '0.06em' }}>
                    {m.ciudad}<br/>
                    <span style={{ color: 'var(--accent)' }}>{m.canal}</span>
                  </div>
                </div>
              ))}
            </div>
          )}
        </div>
        <div className="field">
          <label>Nombre completo <span className="req">*</span></label>
          <input className="input" placeholder="Ej. María Fernanda Pérez" value={cliente.nombre} onChange={e => setCliente(c => ({ ...c, nombre: e.target.value }))} />
        </div>
        <div className="field">
          <label>Departamento <span className="req">*</span></label>
          <select className="select" value={cliente.ciudad} onChange={e => setCliente(c => ({ ...c, ciudad: e.target.value }))}>
            <option value="">— Seleccionar —</option>
            {CITIES.map(c => <option key={c} value={c}>{c}</option>)}
          </select>
        </div>
        <div className="field">
          <label>Canal de venta</label>
          <div className="segmented">
            {CHANNELS.map(ch => (
              <button key={ch} className={cliente.canal === ch ? 'on' : ''} onClick={() => setCliente(c => ({ ...c, canal: ch }))}>
                {ch}
              </button>
            ))}
          </div>
        </div>
        <div className="field" style={{ gridColumn: '1 / -1' }}>
          <label>Dirección / punto de referencia</label>
          <textarea className="textarea" rows="2" placeholder="Col. Palmira, casa #342, calle principal..." value={cliente.direccion} onChange={e => setCliente(c => ({ ...c, direccion: e.target.value }))} />
        </div>
        {onClientCreated && cliente.contacto && cliente.nombre && !exact && (
          <div style={{ gridColumn: '1 / -1', display: 'flex', alignItems: 'center', gap: 12, padding: '10px 14px', background: '#0D150D', border: '1px solid var(--ok)' }}>
            <span className="mono" style={{ fontSize: 11, color: 'var(--ok)', flex: 1 }}>
              {savedMsg ? '✓ Cliente guardado en el sistema' : `"${cliente.nombre}" no está en el sistema aún`}
            </span>
            {!savedMsg && (
              <button className="btn sm" style={{ borderColor: 'var(--ok)', color: 'var(--ok)' }} onClick={() => {
                onClientCreated({ phone: cliente.contacto, nombre: cliente.nombre, ciudad: cliente.ciudad, canal: cliente.canal, direccion: cliente.direccion || '', notas: '', creado: new Date().toISOString().slice(0,10) });
                setSavedMsg(true);
                setTimeout(() => setSavedMsg(false), 3000);
              }}>
                + Guardar como cliente nuevo
              </button>
            )}
          </div>
        )}
      </div>
    </div>
  );
}

function Step2Piezas({ pendingPrenda, setPendingPrenda, pendingColor, setPendingColor, pendingSize, setPendingSize, pendingDesign, setPendingDesign, addItem, items, removeItem, updateItemQty, prendas = PRENDAS, designs = CATALOG, dtfStock = DTF_STOCK }) {
  const prendaObj = prendas.find(p => p.id === pendingPrenda);
  const availableColors = prendaObj ? prendaObj.colors : [];
  const availableSizes = prendaObj ? prendaObj.sizes : [];

  return (
    <div style={{ display: 'grid', gridTemplateColumns: '1.2fr 1fr', gap: 16 }}>
      <div className="panel crop">
        <div className="panel-head">
          <div className="panel-title">PASO 02 · <span className="dim">AGREGAR PIEZA</span></div>
          <span className="chip" style={{ marginLeft: 'auto' }}>
            {[pendingPrenda, pendingColor, pendingSize, pendingDesign].filter(Boolean).length}/4 SELECCIÓN
          </span>
        </div>
        <div className="panel-body" style={{ display: 'flex', flexDirection: 'column', gap: 22 }}>
          <div>
            <div style={{ fontFamily: 'var(--font-mono)', fontSize: 10, letterSpacing: '0.14em', textTransform: 'uppercase', color: 'var(--muted)', marginBottom: 10 }}>
              A · Prenda
            </div>
            <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fill, minmax(160px, 1fr))', gap: 8 }}>
              {prendas.map(p => (
                <button key={p.id}
                  onClick={() => setPendingPrenda(p.id)}
                  style={{
                    border: `1px solid ${pendingPrenda === p.id ? 'var(--accent)' : 'var(--line)'}`,
                    background: pendingPrenda === p.id ? 'var(--card)' : 'var(--surface)',
                    padding: '12px 14px', textAlign: 'left', cursor: 'pointer',
                  }}>
                  <div style={{ fontFamily: 'var(--font-mono)', fontSize: 10, color: 'var(--muted)', letterSpacing: '0.1em' }}>{p.id}</div>
                  <div style={{ fontFamily: 'var(--font-display)', fontWeight: 700, fontSize: 13, marginTop: 4 }}>{p.name}</div>
                  <div style={{ fontFamily: 'var(--font-mono)', fontSize: 10, color: 'var(--dim)', letterSpacing: '0.06em', textTransform: 'uppercase', marginTop: 3 }}>
                    {PRENDA_TIPOS[p.tipo]} · {p.colors.length}×{p.sizes.length} SKU
                  </div>
                </button>
              ))}
            </div>
          </div>

          <div style={{ opacity: pendingPrenda ? 1 : 0.35, pointerEvents: pendingPrenda ? 'auto' : 'none' }}>
            <div style={{ fontFamily: 'var(--font-mono)', fontSize: 10, letterSpacing: '0.14em', textTransform: 'uppercase', color: 'var(--muted)', marginBottom: 10 }}>
              B · Color{prendaObj && <span style={{color:'var(--dim)', marginLeft:8}}>({availableColors.length} disp.)</span>}
            </div>
            <div className="color-swatch-row">
              {availableColors.map(c => (
                <div key={c.id} className={`color-swatch ${pendingColor === c.id ? 'on' : ''}`} onClick={() => setPendingColor(c.id)}>
                  <div className="chip-c" style={{ background: c.hex, borderColor: c.border }} />
                  <div className="name">{c.name.toUpperCase()}</div>
                  <div className="cost">{L(c.cost)} · COSTO</div>
                </div>
              ))}
            </div>
          </div>

          <div style={{ opacity: pendingPrenda && pendingColor ? 1 : 0.35, pointerEvents: pendingPrenda && pendingColor ? 'auto' : 'none' }}>
            <div style={{ fontFamily: 'var(--font-mono)', fontSize: 10, letterSpacing: '0.14em', textTransform: 'uppercase', color: 'var(--muted)', marginBottom: 10 }}>
              C · Talla
            </div>
            <div className="size-row">
              {availableSizes.map(s => (
                <button key={s} className={`size-btn ${pendingSize === s ? 'on' : ''}`} onClick={() => setPendingSize(s)} style={{ width: s === 'ÚNICA' ? 90 : 60 }}>{s}</button>
              ))}
            </div>
          </div>

          <div style={{ opacity: pendingPrenda && pendingColor && pendingSize ? 1 : 0.35, pointerEvents: pendingPrenda && pendingColor && pendingSize ? 'auto' : 'none' }}>
            <div style={{ fontFamily: 'var(--font-mono)', fontSize: 10, letterSpacing: '0.14em', textTransform: 'uppercase', color: 'var(--muted)', marginBottom: 10, display: 'flex', justifyContent: 'space-between' }}>
              <span>D · Diseño DTF del catálogo</span>
              <span className="dim">{designs.length} DISEÑOS</span>
            </div>
            <div className="catalog-grid">
              {/* Sin diseño */}
              <div className={`catalog-card ${pendingDesign === '__none__' ? 'on' : ''}`} onClick={() => setPendingDesign('__none__')}
                style={{ borderStyle: 'dashed', opacity: 0.85 }}>
                <div className="thumb" style={{ display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 22, color: 'var(--dim)' }}>∅</div>
                <div className="nm"><span>Sin diseño</span></div>
                <div className="cat-cost"><span style={{ color: 'var(--dim)' }}>Solo prenda · Sin DTF</span></div>
              </div>
              {designs.map(d => {
                const stk = dtfStock.filter(s => s.design === d.id).reduce((a, s) => a + s.qty, 0);
                const costForSize = pendingSize && d.pricing?.[pendingSize]?.costo ? d.pricing[pendingSize].costo : (d.cost || 0);
                return (
                  <div key={d.id} className={`catalog-card ${pendingDesign === d.id ? 'on' : ''}`} onClick={() => setPendingDesign(d.id)}>
                    <div className="thumb">
                      {d.thumb
                        ? <img src={d.thumb} alt={d.name} style={{ width: '100%', height: '100%', objectFit: 'cover' }} />
                        : <CatThumb id={d.id} />}
                    </div>
                    <div className="nm">
                      <span>{d.name}</span>
                      <span className="sku-tag">{d.tag}</span>
                    </div>
                    <div className="cat-cost" style={{ display: 'flex', justifyContent: 'space-between' }}>
                      <span>{d.id}{costForSize > 0 ? ` · DTF ${L(costForSize)}` : ''}</span>
                      <span style={{ color: stk > 0 ? 'var(--ok)' : 'var(--dim)' }}>{stk > 0 ? `● ${stk} stk` : '○ 0 stk'}</span>
                    </div>
                  </div>
                );
              })}
            </div>
          </div>

          <button className="btn primary" disabled={!pendingPrenda || !pendingColor || !pendingSize || !pendingDesign} onClick={addItem} style={{ alignSelf: 'flex-start', padding: '12px 18px' }}>
            <Icon name="plus" size={13} /> Agregar pieza al pedido
          </button>
        </div>
      </div>

      <div className="panel crop" style={{ alignSelf: 'start', position: 'sticky', top: 0 }}>
        <div className="panel-head">
          <div className="panel-title">PEDIDO ACTUAL · <span className="dim">{items.length.toString().padStart(2, '0')} PIEZAS</span></div>
        </div>
        <div className="panel-body" style={{ paddingTop: 12 }}>
          {items.length === 0 && (
            <div style={{ padding: '40px 8px', textAlign: 'center', color: 'var(--dim)', border: '1px dashed var(--line)', fontFamily: 'var(--font-mono)', fontSize: 11, letterSpacing: '0.1em' }}>
              // NO HAY PIEZAS AGREGADAS
            </div>
          )}
          {items.map((i, idx) => {
            const c = SHIRT_COLORS.find(x => x.id === i.c);
            const d = i.d === '__none__' ? { name: 'Sin diseño' } : designs.find(x => x.id === i.d);
            const p = prendas.find(x => x.id === i.p);
            return (
              <div key={i.id} className="line-item" style={{ gridTemplateColumns: '36px 1fr auto auto 28px', gap: 8 }}>
                <div className="idx">#{(idx + 1).toString().padStart(2, '0')}</div>
                <div className="info">
                  <div className="pname">{d?.name || 'Sin diseño'}</div>
                  <div className="pdetails"><ColorDot id={i.c} /> {p?.name.toUpperCase() || 'CAMISETA'} · {c?.name.toUpperCase()} · {i.s}</div>
                  <div className="mono" style={{ fontSize: 10, color: 'var(--muted)', marginTop: 2 }}>
                    PRENDA {L(i.shirtCost)}{i.dtfCost > 0 ? ` + DTF ${L(i.dtfCost)}` : ' · SIN DTF'}
                  </div>
                </div>
                <div style={{ display: 'flex', alignItems: 'center', gap: 0, border: '1px solid var(--line)', height: 28, alignSelf: 'center' }}>
                  <button onClick={() => updateItemQty(i.id, -1)} style={{ padding: '0 8px', color: 'var(--muted)', fontSize: 16, height: '100%', borderRight: '1px solid var(--line)' }}>−</button>
                  <span className="mono" style={{ fontSize: 12, fontWeight: 700, padding: '0 10px' }}>{i.q}</span>
                  <button onClick={() => updateItemQty(i.id, 1)} style={{ padding: '0 8px', color: 'var(--accent)', fontSize: 16, height: '100%', borderLeft: '1px solid var(--line)' }}>+</button>
                </div>
                <div className="mono" style={{ fontSize: 11, color: 'var(--muted)', alignSelf: 'center', minWidth: 70, textAlign: 'right' }}>
                  {L((i.shirtCost + i.dtfCost) * i.q)}
                </div>
                <button className="btn ghost" style={{ padding: 4 }} onClick={() => removeItem(i.id)}><Icon name="x" size={12} /></button>
              </div>
            );

          {items.length > 0 && (
            <>
              <hr className="divider" />
              <div className="summary-row"><span className="l">Inversión total</span><span className="r mono">{L(items.reduce((a,i) => a + (i.shirtCost + i.dtfCost) * i.q, 0))}</span></div>

            </>

        </div>
      </div>
    </div>
  );
}

function Step3Pago({ payment, setPayment, totals, payConfig = PAY_CONFIG_DEFAULT, precioTotal, setPrecioTotal, items = [], prendas = PRENDAS, designs = CATALOG }) {
  const pm = payConfig.find(m => m.id === payment);
  const hasEnvio = pm && pm.envio > 0;
  const hasComision = pm && pm.comisionPct > 0;
  const precioNum = Number(precioTotal) || 0;
  const gananciaBuena = totals.ganancia > 0;

  return (
    <div style={{ display: 'grid', gridTemplateColumns: '1fr 400px', gap: 16 }}>
      <div className="panel crop">
        <div className="panel-head">
          <div className="panel-title">PASO 03 · <span className="dim">MÉTODO DE PAGO</span></div>
        </div>
        <div className="panel-body">
          <div className="pay-options">
            {payConfig.map(m => (
              <div key={m.id} className={`pay-opt ${payment === m.id ? 'on' : ''}`} onClick={() => setPayment(m.id)}>
                <div className="radio" />
                <div>
                  <div className="l">{m.label}</div>
                  <div className="s">{m.sub}{m.comisionPct > 0 ? ` · ${m.comisionPct}% comisión` : ''}{m.envio > 0 ? ` · envío L ${m.envio}` : ''}</div>
                </div>
              </div>
            ))}
          </div>
        </div>
      </div>

      <div className="panel crop">
        <div className="panel-head">
          <div className="panel-title">CÁLCULO DE GANANCIA</div>
        </div>
        <div className="panel-body">

          {/* Costos fijos */}
          <div className="mono" style={{ fontSize: 10, color: 'var(--muted)', letterSpacing: '0.14em', textTransform: 'uppercase', marginBottom: 10 }}>Tus costos</div>
          <div className="summary-row"><span className="l">Inversión (prendas + DTF)</span><span className="r mono" style={{ color: 'var(--warn)' }}>−{L(totals.inversion)}</span></div>
          {hasEnvio && <div className="summary-row"><span className="l">Envío {pm.label}</span><span className="r mono" style={{ color: 'var(--warn)' }}>−{L(totals.envio)}</span></div>}
          {hasComision && precioNum > 0 && (
            <div className="summary-row">
              <span className="l">Comisión {pm.label} ({pm.comisionPct}%)</span>
              <span className="r mono" style={{ color: 'var(--warn)' }}>−{L(totals.comisionEst)}</span>
            </div>
          )}
          {hasComision && precioNum === 0 && (
            <div className="summary-row"><span className="l" style={{ color: 'var(--dim)' }}>Comisión {pm.label} ({pm.comisionPct}%)</span><span className="r mono" style={{ color: 'var(--dim)' }}>se calcula al ingresar precio</span></div>
          )}

          <hr className="divider" />

          {/* Precio manual */}
          <div className="mono" style={{ fontSize: 10, color: 'var(--muted)', letterSpacing: '0.14em', textTransform: 'uppercase', marginBottom: 8 }}>¿Cuánto vas a cobrar?</div>
          <div style={{ display: 'flex', alignItems: 'center', gap: 10, marginBottom: 16 }}>
            <span className="mono" style={{ fontSize: 18, fontWeight: 700, color: 'var(--muted)' }}>L</span>
            <input
              type="number"
              min="0"
              placeholder="0"
              value={precioTotal}
              onChange={e => setPrecioTotal(e.target.value)}
              className="mono"
              style={{ flex: 1, fontSize: 28, fontWeight: 700, background: '#0B0B0B', border: `2px solid ${precioNum > 0 ? 'var(--accent)' : 'var(--line)'}`, color: 'var(--text)', padding: '10px 14px', outline: 'none', letterSpacing: '-0.02em' }}
            />
          </div>

          {/* Resultado */}
          {precioNum > 0 ? (
            <>
              <div className="summary-row big" style={{ color: gananciaBuena ? 'var(--ok)' : 'var(--accent)' }}>
                <span className="l">GANANCIA</span>
                <span className="r">{gananciaBuena ? '' : '−'}{L(Math.abs(totals.ganancia))}</span>
              </div>
              <div style={{ textAlign: 'right', fontFamily: 'var(--font-mono)', fontSize: 11, color: gananciaBuena ? 'var(--ok)' : 'var(--accent)', marginTop: 4 }}>
                MARGEN {totals.margen.toFixed(1)}%
                {!gananciaBuena && <span style={{ marginLeft: 8 }}>⚠ PRECIO POR DEBAJO DEL COSTO</span>}
              </div>
            </>
          ) : (
            <div className="mono" style={{ fontSize: 11, color: 'var(--dim)', letterSpacing: '0.08em', textAlign: 'center', padding: '12px 0', border: '1px dashed var(--line)' }}>
              Ingresa el precio para ver la ganancia
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

function Step4Resumen({ orderN, cliente, items, payment, totals, onConfirm, onReset, payConfig = PAY_CONFIG_DEFAULT }) {

  if (confirmed) {

          </div>
          <div className="display" style={{ fontSize: 64, letterSpacing: '-0.04em' }}>#{orderN}</div>
          <div style={{ color: 'var(--muted)', fontSize: 13 }}>{cliente.nombre} · {items.length} piezas · {L(totals.precio)}</div>
          <div style={{ display: 'flex', gap: 10, marginTop: 12 }}>
            <button className="btn"><Icon name="printer" size={12} /> Imprimir etiqueta</button>
            <button className="btn primary" onClick={() => onReset()}>Iniciar nueva venta <Icon name="arrow-r" size={12} /></button>

  }

  return (
    <div>
      <div className="order-hero">

          <div className="ord-num">#{orderN}</div>
        </div>
        <div className="ord-meta">
          <div className="k">CLIENTE</div>
          <div className="v">{cliente.nombre || '—'}</div>
          <div className="k">CANAL</div>
          <div className="v">{cliente.canal} · {cliente.ciudad}</div>
        </div>
      </div>

      <div style={{ display: 'grid', gridTemplateColumns: '1.2fr 1fr', gap: 16, marginTop: 16 }}>
        <div className="panel crop">
          <div className="panel-head"><div className="panel-title">PIEZAS · {items.length.toString().padStart(2,'0')}</div></div>
          <div style={{ padding: '4px 16px 16px' }}>
            {items.map((i, idx) => {
              const c = SHIRT_COLORS.find(x => x.id === i.c);
              const d = i.d === '__none__' ? { name: 'Sin diseño', cost: 0 } : designs.find(x => x.id === i.d);
              const p = prendas.find(x => x.id === i.p);
              return (
                <div key={i.id} className="line-item" style={{ marginTop: 8 }}>
                  <div className="idx">{(idx + 1).toString().padStart(2, '0')}</div>
                  <div className="info">
                    <div className="pname">{d?.name || 'Sin diseño'}</div>
                    <div className="pdetails"><ColorDot id={i.c} /> {p?.name || 'Camiseta'} · {c?.name} · {i.s} · {i.d !== '__none__' ? i.d : '—'}</div>
                  </div>
                  <div className="cost-breakdown">
                    <div>PRENDA {L(i.shirtCost)}{i.dtfCost > 0 ? ` + DTF ${L(i.dtfCost)}` : ' · SIN DTF'}</div>
                    <span className="mono" style={{ fontSize: 11, color: 'var(--muted)' }}>x{i.q}</span>
                  </div>
                  <div className="mono" style={{ fontSize: 10, color: 'var(--dim)', letterSpacing: '0.1em' }}>x{i.q}</div>
                </div>
              );
            })}
          </div>
        </div>

        <div className="panel crop">
          <div className="panel-head"><div className="panel-title">LIQUIDACIÓN</div></div>
          <div className="panel-body">
            <div className="summary-row"><span className="l">Pago</span><span className="r mono">{payLabel.toUpperCase()}</span></div>
            <div className="summary-row"><span className="l">Precio cobrado</span><span className="r mono">{L(totals.precio)}</span></div>
            {totals.envio > 0 && <div className="summary-row"><span className="l">Envío</span><span className="r mono" style={{color:'var(--warn)'}}>−{L(totals.envio)}</span></div>}
            <hr className="divider" />
            <div className="summary-row"><span className="l">Inversión</span><span className="r mono" style={{color: 'var(--warn)'}}>−{L(totals.inversion)}</span></div>
            {pm && pm.comisionPct > 0 && <div className="summary-row"><span className="l">Comisión {pm.label} ({pm.comisionPct}%)</span><span className="r mono" style={{color: 'var(--warn)'}}>−{L(totals.comisionEst)}</span></div>}
            <div className="summary-row big positive"><span className="l">GANANCIA</span><span className="r">{L(totals.ganancia)}</span></div>
            <div style={{ textAlign: 'right', fontFamily: 'var(--font-mono)', fontSize: 11, color: 'var(--muted)' }}>MARGEN {totals.margen.toFixed(1)}%</div>

            <button className="btn primary" style={{ width: '100%', padding: '14px', marginTop: 18, fontSize: 12, letterSpacing: '0.18em' }} onClick={() => { onConfirm(); setConfirmed(true); }}>

}
