      </div>

      {editing && (
        <ClienteForm
          original={editing === 'new' ? null : editing}

              <th>Canal</th>
              <th style={{ textAlign: 'right' }}>Pedidos</th>

                <tr key={c.phone} onClick={() => setEditing(c.phone)}>

<script type="text/babel">
// Main App shell
const { useState: useS, useEffect: useE } = React;

function App() {
  const [route, setRoute] = useS(() => localStorage.getItem('tooned-route') || 'nueva');
  const [orderKey, setOrderKey] = useS(0);
  const [orders, setOrders] = useS(SAMPLE_ORDERS);
  const [clients, setClients] = useS(SAMPLE_CLIENTS);
  const [designCats, setDesignCats] = useS(DESIGN_CATS_DEFAULT);
  const [payConfig, setPayConfig] = useS(PAY_CONFIG_DEFAULT);
  const [tweaksOpen, setTweaksOpen] = useS(false);
  const [tweaks, setTweaks] = useS(window.__TWEAKS__);
  const [gSearch, setGSearch] = useS('');
  const [gSearchOpen, setGSearchOpen] = useS(false);
  const [fbReady, setFbReady] = useS(false);
  const saveTimers = React.useRef({});

  // ── Inventario state (lifted so Ventas can restore stock on delete) ──
  const [prendas, setPrendas] = useS(PRENDAS);
  const [dtfSizes, setDtfSizes] = useS(DTF_SIZES);
  const [stock, setStock] = useS(seedStock);
  const [dtfStock, setDtfStock] = useS(DTF_STOCK);
  const [designs, setDesigns] = useS(CATALOG);
  const [invReady, setInvReady] = useS(false);
  const invTimer = React.useRef(null);

  const addStock = (key, delta) => setStock(prev => ({ ...prev, [key]: Math.max(0, (prev[key] || 0) + delta) }));
  const setStockVal = (key, val) => setStock(prev => ({ ...prev, [key]: Math.max(0, val) }));

  // ── Firebase: cargar datos al iniciar ──
  useE(() => {
    const col = window.db.collection('data');
    Promise.all([
      col.doc('orders').get(),
      col.doc('clients').get(),
      col.doc('config').get(),
      col.doc('inventory').get(),
    ]).then(([oDoc, cDoc, cfDoc, invDoc]) => {
      if (oDoc.exists && oDoc.data().items?.length) setOrders(oDoc.data().items);
      if (cDoc.exists && cDoc.data().items?.length) setClients(cDoc.data().items);
      if (cfDoc.exists && cfDoc.data().payConfig?.length) {
        setPayConfig(cfDoc.data().payConfig);
        if (cfDoc.data().designCats?.length) setDesignCats(cfDoc.data().designCats);
      }
      if (invDoc.exists) {
        const d = invDoc.data();
        if (d.prendas?.length)  setPrendas(d.prendas);
        if (d.stock)            setStock(d.stock);
        if (d.designs?.length)  setDesigns(d.designs);
        if (d.dtfSizes?.length) setDtfSizes(d.dtfSizes);
        if (d.dtfStock?.length) setDtfStock(d.dtfStock);
      }
    }).catch(e => console.warn('Firebase load:', e)).finally(() => { setFbReady(true); setInvReady(true); });
  }, []);

  // ── Firebase: guardar con debounce al cambiar datos ──
  const fbSave = (key, data) => {
    clearTimeout(saveTimers.current[key]);
    saveTimers.current[key] = setTimeout(() => {
      window.db.collection('data').doc(key).set(data).catch(e => console.warn('FB save:', e));
    }, 1500);
  };
  useE(() => { if (fbReady) fbSave('orders',  { items: orders }); },    [orders,  fbReady]);
  useE(() => { if (fbReady) fbSave('clients', { items: clients }); },   [clients, fbReady]);
  useE(() => { if (fbReady) fbSave('config',  { payConfig, designCats }); }, [payConfig, designCats, fbReady]);
  useE(() => {
    if (!invReady) return;
    clearTimeout(invTimer.current);
    invTimer.current = setTimeout(() => {
      window.db.collection('data').doc('inventory').set({ prendas, stock, designs, dtfSizes, dtfStock })
        .catch(e => console.warn('Inv save:', e));
    }, 2000);
  }, [prendas, stock, designs, dtfSizes, dtfStock, invReady]);

  useE(() => { localStorage.setItem('tooned-route', route); }, [route]);

  // Apply tweaks
  useE(() => {
    document.documentElement.style.setProperty('--accent', tweaks.accent);
    document.documentElement.style.setProperty('--accent-ink', tweaks.accent);
    document.body.classList.toggle('density-compact', tweaks.density === 'compact');
    document.documentElement.style.setProperty('--font-display', tweaks.displayFont === 'Archivo' ? "'Archivo', system-ui, sans-serif" : "'Archivo Narrow', 'Archivo', system-ui, sans-serif");
  }, [tweaks]);

  // Tweaks host protocol
  useE(() => {
    const handler = (e) => {
      if (e.data?.type === '__activate_edit_mode') setTweaksOpen(true);
      if (e.data?.type === '__deactivate_edit_mode') setTweaksOpen(false);
    };
    window.addEventListener('message', handler);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', handler);
  }, []);

  const setTweak = (k, v) => {
    const next = { ...tweaks, [k]: v };
    setTweaks(next);
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { [k]: v } }, '*');
  };

  const nextOrderNumber = Math.max(1049, ...orders.map(o => o.n)) + 1;

  // ── Ticker stats — calculados desde datos reales ──
  const tickerStats = React.useMemo(() => {
    const now = new Date();
    const mesLabel = now.toLocaleDateString('es-HN', { month: 'short', year: '2-digit' }).toUpperCase().replace('. ', ' ');
    const thisMonth = o => {
      const d = new Date(o.fecha);
      return d.getFullYear() === now.getFullYear() && d.getMonth() === now.getMonth();
    };
    const monthOrders = orders.filter(thisMonth);
    const ventaMes = monthOrders.reduce((a, o) => a + (o.total || 0), 0);
    const gananciaMes = monthOrders.reduce((a, o) => {
      const inv = (o.items || []).reduce((s, i) => s + ((i.shirtCost || 0) + (i.dtfCost || 0)) * (i.q || 1), 0);
      return a + (o.total || 0) - inv - (o.comision || 0);
    }, 0);
    const lowThreshold = 3;
    const stockBajo = Object.values(stock).filter(v => v > 0 && v <= lowThreshold).length;
    const boxfulPend = orders.filter(o => o.payStatus === 'boxful-pending' && !['rebotado','perdido'].includes(o.estado)).length;
    return { mesLabel, ventaMes, gananciaMes, stockBajo, boxfulPend };
  }, [orders, stock]);

  const handleOrderCreated = (order) => {
    setOrders(prev => [order, ...prev]);
    // Auto-save/update client by phone
    if (order.phone) {
      setClients(prev => {
        const existing = prev.find(c => c.phone === order.phone);
        if (existing) {
          return prev.map(c => c.phone === order.phone ? { ...c, nombre: order.cliente || c.nombre, ciudad: order.ciudad || c.ciudad, canal: order.canal || c.canal, direccion: order.direccion || c.direccion || '' } : c);
        }
        return [{
          phone: order.phone,
          nombre: order.cliente,
          ciudad: order.ciudad,
          canal: order.canal,
          direccion: order.direccion || '',
          notas: '',
          creado: order.fecha || new Date().toISOString().slice(0,10),
        }, ...prev];
      });
    }
  };

  const handleOrderUpdate = (n, patch) => {
    setOrders(prev => prev.map(o => o.n === n ? { ...o, ...patch } : o));
  };

  const handleDeleteOrder = (n) => {
    const order = orders.find(o => o.n === n);
    if (!order) return;
    if (!window.confirm(`¿Eliminar pedido #${n} de ${order.cliente}?\nEl stock de los items regresará al inventario.`)) return;
    // Restore shirt stock
    order.items?.forEach(i => {
      if (i.p && i.c && i.s) {
        const key = makeStockKey(i.p, i.c, i.s);
        setStock(prev => ({ ...prev, [key]: (prev[key] || 0) + (i.q || 1) }));
      }
    });
    // Restore DTF stock
    order.items?.forEach(i => {
      if (i.d && i.d !== '__none__' && i.s) {
        setDtfStock(prev => {
          const existing = prev.find(s => s.design === i.d && s.size === i.s);
          if (existing) return prev.map(s => s.design === i.d && s.size === i.s ? { ...s, qty: s.qty + (i.q || 1) } : s);
          return [...prev, { design: i.d, size: i.s, qty: i.q || 1 }];
        });
      }
    });
    setOrders(prev => prev.filter(o => o.n !== n));
  };

  const modules = [
    { id: 'nueva',      label: 'Nueva Venta',   num: '01', icon: 'plus' },
    { id: 'ventas',     label: 'Ventas',        num: '02', icon: 'list' },
    { id: 'clientes',   label: 'Clientes',      num: '03', icon: 'user' },
    { id: 'inventario', label: 'Inventario',    num: '04', icon: 'box' },
    { id: 'metricas',   label: 'Métricas',      num: '05', icon: 'chart' },
    { id: 'config',     label: 'Configuración', num: '06', icon: 'settings' },
  ];

  const currentModule = modules.find(m => m.id === route);

  if (!fbReady) return (
    <div style={{ position: 'fixed', inset: 0, background: '#0A0A0A', display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', gap: 20, zIndex: 9999 }}>
      <div style={{ fontFamily: 'var(--font-display)', fontWeight: 900, fontSize: 36, letterSpacing: '-0.02em' }}>TOONED<span style={{ color: 'var(--accent)' }}>.</span></div>
      <div className="mono" style={{ fontSize: 11, color: 'var(--muted)', letterSpacing: '0.14em', textTransform: 'uppercase' }}>Conectando con Firebase…</div>
      <div style={{ width: 180, height: 2, background: '#1A1A1A', overflow: 'hidden' }}>
        <div style={{ height: '100%', background: 'var(--accent)', animation: 'loadBar 1.4s ease-in-out infinite' }} />
      </div>
      <style>{`@keyframes loadBar { 0%{width:0%;margin-left:0} 50%{width:60%;margin-left:20%} 100%{width:0%;margin-left:100%} }`}</style>
    </div>
  );

  return (
    <div className={`app ${tweaks.sidebarCollapsed ? 'collapsed' : ''}`} data-screen-label={currentModule?.label}>
      {/* Sidebar */}
      <aside className="sidebar">
        <div className="sidebar-brand">
          {!tweaks.sidebarCollapsed && (
            <div>
              <div className="wordmark">TOONED<span className="dot">.</span></div>
              <div className="sidebar-sub">OS · v0.1 · HN</div>
            </div>
          )}
          {tweaks.sidebarCollapsed && (
            <div className="wordmark" style={{ fontSize: 16 }}>T<span className="dot">.</span></div>
          )}
        </div>

        {!tweaks.sidebarCollapsed && (
          <div style={{ padding: '8px 12px', borderBottom: '1px solid var(--line)', position: 'relative' }}>
            <div style={{ display: 'flex', alignItems: 'center', gap: 7, background: '#0F0F0F', border: `1px solid ${gSearchOpen ? 'var(--accent)' : 'var(--line)'}`, padding: '6px 10px' }}>
              <Icon name="search" size={12} />
              <input
                style={{ background: 'transparent', border: 0, color: 'var(--text)', fontFamily: 'var(--font-mono)', fontSize: 11, outline: 'none', width: '100%' }}
                placeholder="Buscar pedido, cliente…"
                value={gSearch}
                onFocus={() => setGSearchOpen(true)}
                onBlur={() => setTimeout(() => setGSearchOpen(false), 180)}
                onChange={e => { setGSearch(e.target.value); setGSearchOpen(true); }}
              />
              {gSearch && <button onClick={() => setGSearch('')} style={{ color: 'var(--dim)', fontSize: 14, lineHeight: 1 }}>×</button>}
            </div>
            {gSearchOpen && gSearch.trim().length >= 2 && (() => {
              const q = gSearch.toLowerCase();
              const orderHits = orders.filter(o => `${o.n} ${o.cliente} ${o.ciudad}`.toLowerCase().includes(q)).slice(0, 4);
              const clientHits = clients.filter(c => `${c.nombre} ${c.phone}`.toLowerCase().includes(q)).slice(0, 3);
              const total = orderHits.length + clientHits.length;
              return (
                <div style={{ position: 'absolute', left: 0, right: 0, top: '100%', background: '#0F0F0F', border: '1px solid var(--accent)', zIndex: 200, boxShadow: '0 12px 40px rgba(0,0,0,0.7)', maxHeight: 360, overflowY: 'auto' }}>
                  {total === 0 && <div className="mono" style={{ padding: '14px 12px', fontSize: 11, color: 'var(--muted)' }}>Sin resultados</div>}
                  {orderHits.length > 0 && <div className="mono" style={{ fontSize: 9, letterSpacing: '0.14em', color: 'var(--dim)', padding: '6px 10px', borderBottom: '1px solid var(--line)', textTransform: 'uppercase' }}>Pedidos</div>}
                  {orderHits.map(o => (
                    <div key={o.n} onMouseDown={() => { setRoute('ventas'); setGSearch(''); setGSearchOpen(false); }}
                      style={{ padding: '9px 12px', borderBottom: '1px solid var(--line)', cursor: 'pointer', background: '#0F0F0F' }}
                      onMouseEnter={e => e.currentTarget.style.background='#1A1A1A'}
                      onMouseLeave={e => e.currentTarget.style.background='#0F0F0F'}>
                      <div className="mono" style={{ fontSize: 11, fontWeight: 700 }}>#{o.n} <span style={{ color: 'var(--muted)', fontWeight: 400 }}>· {o.cliente}</span></div>
                      <div className="mono" style={{ fontSize: 10, color: 'var(--dim)', marginTop: 2 }}>{o.fecha} · {L(o.total)}</div>
                    </div>
                  ))}
                  {clientHits.length > 0 && <div className="mono" style={{ fontSize: 9, letterSpacing: '0.14em', color: 'var(--dim)', padding: '6px 10px', borderBottom: '1px solid var(--line)', textTransform: 'uppercase' }}>Clientes</div>}
                  {clientHits.map(c => (
                    <div key={c.phone} onMouseDown={() => { setRoute('clientes'); setGSearch(''); setGSearchOpen(false); }}
                      style={{ padding: '9px 12px', borderBottom: '1px solid var(--line)', cursor: 'pointer', background: '#0F0F0F' }}
                      onMouseEnter={e => e.currentTarget.style.background='#1A1A1A'}
                      onMouseLeave={e => e.currentTarget.style.background='#0F0F0F'}>
                      <div style={{ fontSize: 12, fontWeight: 500 }}>{c.nombre}</div>
                      <div className="mono" style={{ fontSize: 10, color: 'var(--muted)', marginTop: 2 }}>{c.phone} · {c.ciudad}</div>
                    </div>
                  ))}
                </div>
              );
            })()}
          </div>
        )}

        {!tweaks.sidebarCollapsed && <div className="sidebar-section">Módulos</div>}
        <nav className="nav">
          {modules.map(m => (
            <button key={m.id} className={`nav-item ${route === m.id ? 'active' : ''}`} onClick={() => setRoute(m.id)}>
              <Icon name={m.icon} size={15} />
              {!tweaks.sidebarCollapsed && <>
                <span>{m.label}</span>
                <span className="num">{m.num}</span>
              </>}
            </button>
          ))}
        </nav>

        {!tweaks.sidebarCollapsed && <>
          <div className="sidebar-section">Accesos rápidos</div>
          <nav className="nav">
            <button className="nav-item"><Icon name="printer" size={15} /><span>Etiquetas Boxful</span></button>
            <button className="nav-item"><Icon name="refresh" size={15} /><span>Sync inventario</span></button>
          </nav>
        </>}

        <div className="sidebar-footer">
          {!tweaks.sidebarCollapsed ? (
            <>
              <span className="status-dot" />ONLINE · LOCAL<br />
              <span style={{ color: 'var(--dim)' }}>SQLITE · 128 KB</span>
            </>
          ) : (
            <span className="status-dot" />
          )}
        </div>
      </aside>

      {/* Main */}
      <div className="main">
        <div className="ticker">
          <span className="item">● SIST. OK</span>
          <span className="sep">·</span>
          <span className="item">PRÓX. ORDEN <span className="v">#{nextOrderNumber}</span></span>
          <span className="sep">·</span>
          <span className="item">{tickerStats.mesLabel} · VENTA <span className="v">{L(tickerStats.ventaMes)}</span></span>
          <span className="sep">·</span>
          <span className="item">GANANCIA <span className="v" style={{color: tickerStats.gananciaMes >= 0 ? 'var(--ok)' : 'var(--accent)'}}>{L(tickerStats.gananciaMes)}</span></span>
          <span className="sep">·</span>
          <span className="item">STOCK BAJO <span className="v" style={{color: tickerStats.stockBajo > 0 ? 'var(--warn)' : 'var(--muted)'}}>{tickerStats.stockBajo} SKU</span></span>
          <span className="sep">·</span>
          <span className="item">BOXFUL PEND <span className="v" style={{color: tickerStats.boxfulPend > 0 ? 'var(--warn)' : 'var(--muted)'}}>{tickerStats.boxfulPend}</span></span>
        </div>

        <div className="topbar">
          <div className="breadcrumb">
            TOONED OS <span className="sep">/</span> MÓDULO {currentModule.num} <span className="sep">/</span> <span className="cur">{currentModule.label.toUpperCase()}</span>
          </div>
          <div className="topbar-right">
            <span className="chip">USR <span className="v">ADMIN</span></span>
            <span className="chip">{new Date().toLocaleDateString('es-HN', { weekday: 'short', day: '2-digit', month: 'short' }).toUpperCase()}</span>
            <button className="btn sm ghost" onClick={() => setTweaksOpen(o => !o)}><Icon name="sliders" size={12} /> TWEAKS</button>
          </div>
        </div>

        <div className="content">
          {route === 'nueva'      && <NuevaVenta key={orderKey} onOrderCreated={(o) => handleOrderCreated(o)} onReset={() => { setOrderKey(k => k + 1); setRoute('nueva'); }} nextOrderNumber={nextOrderNumber} clients={clients} payConfig={payConfig} onClientCreated={(c) => setClients(prev => prev.find(x => x.phone === c.phone) ? prev : [c, ...prev])} prendas={prendas} designs={designs} dtfStock={dtfStock} />}
          {route === 'ventas'     && <Ventas orders={orders} onOrderUpdate={handleOrderUpdate} onOrderDelete={handleDeleteOrder} payConfig={payConfig} />}
          {route === 'clientes'   && <Clientes clients={clients} setClients={setClients} orders={orders} />}
          {route === 'inventario' && <Inventario prendas={prendas} setPrendas={setPrendas} dtfSizes={dtfSizes} setDtfSizes={setDtfSizes} stock={stock} addStock={addStock} setStockVal={setStockVal} dtfStock={dtfStock} setDtfStock={setDtfStock} designs={designs} setDesigns={setDesigns} designCats={designCats} setDesignCats={setDesignCats} setOrders={setOrders} />}
          {route === 'metricas'   && <Metricas orders={orders} />}
          {route === 'config'     && <Configuracion payConfig={payConfig} setPayConfig={setPayConfig} />}
        </div>
      </div>

      {tweaksOpen && (
        <div className="tweaks-panel">
          <div className="tweaks-head">
            <div className="t">Tweaks</div>
            <button className="x" onClick={() => setTweaksOpen(false)}>✕</button>
          </div>
          <div className="tweaks-body">
            <div className="tweak-row">
              <span className="lbl">Acento</span>
              <div className="tweak-colors">
                {['#E63946', '#FF6A00', '#F1F1F1', '#6BA3E0', '#7BC96F'].map(c => (
                  <div key={c} className={`tweak-col ${tweaks.accent === c ? 'on' : ''}`} style={{ background: c }} onClick={() => setTweak('accent', c)} />
                ))}
              </div>
            </div>
            <div className="tweak-row">
              <span className="lbl">Densidad</span>
              <div className="segmented">
                <button className={tweaks.density === 'comfortable' ? 'on' : ''} onClick={() => setTweak('density', 'comfortable')}>Cómoda</button>
                <button className={tweaks.density === 'compact' ? 'on' : ''} onClick={() => setTweak('density', 'compact')}>Compacta</button>
              </div>
            </div>
            <div className="tweak-row">
              <span className="lbl">Sidebar</span>
              <div className="segmented">
                <button className={!tweaks.sidebarCollapsed ? 'on' : ''} onClick={() => setTweak('sidebarCollapsed', false)}>Expandida</button>
                <button className={tweaks.sidebarCollapsed ? 'on' : ''} onClick={() => setTweak('sidebarCollapsed', true)}>Colapsada</button>
              </div>
            </div>
            <div className="tweak-row">
              <span className="lbl">Display font</span>
              <div className="segmented">
                <button className={tweaks.displayFont === 'Archivo' ? 'on' : ''} onClick={() => setTweak('displayFont', 'Archivo')}>Archivo</button>
                <button className={tweaks.displayFont === 'Archivo Narrow' ? 'on' : ''} onClick={() => setTweak('displayFont', 'Archivo Narrow')}>Narrow</button>
              </div>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);

</script>
</body>
</html>
