<script type="text/babel">
// Métricas dashboard — datos en tiempo real desde orders
const MES_LABELS = ['ENE','FEB','MAR','ABR','MAY','JUN','JUL','AGO','SEP','OCT','NOV','DIC'];

function Metricas({ orders = [] }) {
  const [period, setPeriod] = useState('mes');
  const now = new Date();
  const cy = now.getFullYear(), cm = now.getMonth();

  const activeOrders = orders.filter(o => !['rebotado','perdido'].includes(o.estado));

  const filteredOrders = useMemo(() => {
    return activeOrders.filter(o => {
      const d = new Date(o.fecha);
      if (period === 'mes')  return d.getFullYear() === cy && d.getMonth() === cm;
      if (period === 'trim') { const qs = Math.floor(cm/3)*3; return d.getFullYear() === cy && d.getMonth() >= qs && d.getMonth() < qs+3; }
      if (period === 'año')  return d.getFullYear() === cy;
      return true;
    });
  }, [orders, period]);

  const calcInversion = (o) => o.items.reduce((a, i) => {
    const col = SHIRT_COLORS.find(x => x.id === i.c);
    const des = CATALOG.find(x => x.id === i.d);
    return a + ((col?.cost || 0) + (des?.cost || 0)) * i.q;
  }, 0);

  const kpis = useMemo(() => {
    const bruta       = filteredOrders.reduce((a,o) => a + o.total, 0);
    const recolectado = filteredOrders.filter(o => !o.payStatus.endsWith('-pending')).reduce((a,o) => a + o.total, 0);
    const inversion   = filteredOrders.reduce((a,o) => a + calcInversion(o), 0);
    const comisiones  = filteredOrders.reduce((a,o) => a + (o.comision||0), 0);
    const ganancia    = bruta - inversion - comisiones;
    const margen      = bruta > 0 ? (ganancia/bruta)*100 : 0;
    return { bruta, recolectado, inversion, comisiones, ganancia, margen };
  }, [filteredOrders]);

  const weekData = useMemo(() => {
    const monthOrders = activeOrders.filter(o => { const d=new Date(o.fecha); return d.getFullYear()===cy && d.getMonth()===cm; });
    return [1,2,3,4].map(w => {
      const s=(w-1)*7+1, e=w*7;
      const v = monthOrders.filter(o => { const day=new Date(o.fecha).getDate(); return day>=s && day<=e; }).reduce((a,o)=>a+o.total,0);
      return { wk: `Sem ${String(w).padStart(2,'0')}`, v };
    });
  }, [orders]);

  const topDesigns = useMemo(() => {
    const map = {};
    filteredOrders.forEach(o => o.items.forEach(i => {
      if (!map[i.d]) { const d=CATALOG.find(x=>x.id===i.d); map[i.d]={id:i.d,name:d?.name||i.d,qty:0,revenue:0}; }
      const col=SHIRT_COLORS.find(x=>x.id===i.c), des=CATALOG.find(x=>x.id===i.d);
      const price=Math.max(420, Math.ceil(((col?.cost||215)+(des?.cost||85))*1.35/5)*5);
      map[i.d].qty += i.q;
      map[i.d].revenue += price*i.q;
    }));
    return Object.values(map).sort((a,b)=>b.revenue-a.revenue).slice(0,5);
  }, [filteredOrders]);

  const channelBreakdown = useMemo(() => {
    const map = {};
    filteredOrders.forEach(o => {
      if (!map[o.canal]) map[o.canal]={ch:o.canal,orders:0,revenue:0};
      map[o.canal].orders++; map[o.canal].revenue+=o.total;
    });
    const total = filteredOrders.length||1;
    return Object.values(map).sort((a,b)=>b.revenue-a.revenue).map(c=>({...c,pct:Math.round((c.orders/total)*100)}));
  }, [filteredOrders]);

  const monthlyHistory = useMemo(() => {
    const map = {};
    activeOrders.forEach(o => {
      const d=new Date(o.fecha);
      const key=`${MES_LABELS[d.getMonth()]} ${String(d.getFullYear()).slice(2)}`;
      if (!map[key]) map[key]={mes:key,bruta:0,recolectada:0,inversion:0,comisiones:0,year:d.getFullYear(),month:d.getMonth()};
      map[key].bruta+=o.total;
      if (!o.payStatus.endsWith('-pending')) map[key].recolectada+=o.total;
      map[key].inversion+=calcInversion(o);
      map[key].comisiones+=(o.comision||0);
    });
    const curKey=`${MES_LABELS[cm]} ${String(cy).slice(2)}`;
    return Object.values(map)
      .sort((a,b)=>a.year!==b.year?a.year-b.year:a.month-b.month)
      .slice(-6)
      .map(m=>({...m,ganancia:m.bruta-m.inversion-m.comisiones,margen:m.bruta>0?((m.bruta-m.inversion-m.comisiones)/m.bruta)*100:0,current:m.mes===curKey}));
  }, [orders]);

  const maxWeek = Math.max(...weekData.map(w=>w.v), 1);
  const periodLabel = period==='mes'?`${MES_LABELS[cm]} ${String(cy).slice(2)}`:period==='trim'?'TRIMESTRE':'AÑO';

  return (
    <div>
      <div className="page-head">
        <div>
          <div className="page-kicker">MÓDULO · 04 / MÉTRICAS</div>
          <div className="page-title">Dashboard operativo</div>
          <div className="page-desc">{filteredOrders.length} pedidos en el período · datos en tiempo real desde tus registros.</div>
        </div>
        <div style={{ display: 'flex', gap: 10 }}>
          <div className="segmented">
            <button className={period==='mes'?'on':''} onClick={()=>setPeriod('mes')}>MES</button>
            <button className={period==='trim'?'on':''} onClick={()=>setPeriod('trim')}>TRIM</button>
            <button className={period==='año'?'on':''} onClick={()=>setPeriod('año')}>AÑO</button>
          </div>
        </div>
      </div>

      <div className="kpi-grid">
        <div className="kpi">
          <div className="label"><span className="idx">01</span>Venta bruta</div>
          <div className="value">{L(kpis.bruta)}</div>
        </div>
        <div className="kpi">
          <div className="label"><span className="idx">02</span>Recolectado</div>
          <div className="value">{L(kpis.recolectado)}</div>
        </div>
        <div className="kpi">
          <div className="label"><span className="idx">03</span>Inversión</div>
          <div className="value">{L(kpis.inversion)}</div>
        </div>
        <div className="kpi accent">
          <div className="label"><span className="idx" style={{color:'rgba(10,10,10,0.5)'}}>04</span>Ganancia neta</div>
          <div className="value">{L(kpis.ganancia)}</div>
        </div>
        <div className="kpi">
          <div className="label"><span className="idx">05</span>Margen</div>
          <div className="value">{kpis.margen.toFixed(1)}<span className="unit">%</span></div>
        </div>
      </div>

      <div className="metrics-grid">
        <div className="panel crop">
          <div className="panel-head">
            <div className="panel-title">VENTA POR SEMANA · <span className="dim">{periodLabel}</span></div>
            <span className="chip" style={{ marginLeft: 'auto' }}>
              PROM <span className="v mono">{L(Math.round(weekData.reduce((a,w)=>a+w.v,0)/Math.max(weekData.filter(w=>w.v>0).length,1)))}</span>
            </span>
          </div>
          <div className="panel-body">
            <div className="bar-chart">
              {weekData.map(w => (
                <div key={w.wk} className="bar-col">
                  <div className="v">{w.v>0?(w.v/1000).toFixed(1)+'K':'—'}</div>
                  <div className="bar-wrap"><div className="bar" style={{ height: `${(w.v/maxWeek)*100}%` }} /></div>
                  <div className="lbl">{w.wk}</div>
                </div>
              ))}
            </div>
          </div>
        </div>

        <div className="panel crop">
          <div className="panel-head">
            <div className="panel-title">TOP 5 DISEÑOS</div>
            <span className="chip" style={{ marginLeft: 'auto' }}>{periodLabel}</span>
          </div>
          {topDesigns.length===0
            ? <div style={{padding:24,color:'var(--muted)',fontFamily:'var(--font-mono)',fontSize:12,textAlign:'center'}}>Sin pedidos en el período</div>
            : <div className="top-list">
                {topDesigns.map((d,i) => (
                  <div key={d.id} className="top-row">
                    <div className="rank">{(i+1).toString().padStart(2,'0')}</div>
                    <div className="th"><CatThumb id={d.id} /></div>
                    <div><div className="nm">{d.name}</div><div className="snm">{d.id} · {d.qty} UDS</div></div>
                    <div className="v">{L(d.revenue)}</div>
                  </div>
                ))}
              </div>
          }
        </div>
      </div>

      <div className="metrics-grid-2">
        <div className="panel crop">
          <div className="panel-head">
            <div className="panel-title">CANAL DE VENTA · <span className="dim">{filteredOrders.length} PEDIDOS</span></div>
          </div>
          {channelBreakdown.length===0
            ? <div style={{padding:24,color:'var(--muted)',fontFamily:'var(--font-mono)',fontSize:12,textAlign:'center'}}>Sin pedidos en el período</div>
            : <div style={{padding:0}}>
                {channelBreakdown.map((c,i) => (
                  <div key={c.ch} className="channel-row">
                    <div className="ch"><span className="mono" style={{color:'var(--dim)',marginRight:8}}>{(i+1).toString().padStart(2,'0')}</span>{c.ch}</div>
                    <div className="trk"><span style={{width:`${c.pct}%`}} /></div>
                    <div className="v">{c.pct}% · {L(c.revenue)}</div>
                  </div>
                ))}
              </div>
          }
        </div>

        <div className="panel crop">
          <div className="panel-head">
            <div className="panel-title">HISTÓRICO POR MES</div>
            <span className="chip" style={{ marginLeft: 'auto' }}>6 MESES</span>
          </div>
          {monthlyHistory.length===0
            ? <div style={{padding:24,color:'var(--muted)',fontFamily:'var(--font-mono)',fontSize:12,textAlign:'center'}}>Sin datos históricos</div>
            : <table className="tbl">
                <thead>
                  <tr>
                    <th>Mes</th>
                    <th style={{textAlign:'right'}}>Bruta</th>
                    <th style={{textAlign:'right'}}>Recolectada</th>
                    <th style={{textAlign:'right'}}>Ganancia</th>
                    <th style={{textAlign:'right'}}>Margen</th>
                  </tr>
                </thead>
                <tbody>
                  {monthlyHistory.map(m => (
                    <tr key={m.mes} style={m.current?{background:'#151515'}:{}}>
                      <td className="mono" style={{color:m.current?'var(--accent)':'var(--text)'}}>{m.current&&'▸ '}{m.mes}</td>
                      <td className="num">{L(m.bruta)}</td>
                      <td className="num">{L(m.recolectada)}</td>
                      <td className="num" style={{color:'var(--ok)'}}>{L(m.ganancia)}</td>
                      <td className="num">{m.margen.toFixed(1)}%</td>
                    </tr>
                  ))}
                </tbody>
              </table>
          }
        </div>
      </div>
    </div>
  );
}

Object.assign(window, { Metricas });

</script>
<script type="text/babel">
// Ventas table
function Ventas({ orders, onOrderUpdate, onOrderDelete }) {
  const [filters, setFilters] = useState({ estado: 'all', pay: 'all', canal: 'all', fecha: 'all', q: '' });
  const [selected, setSelected] = useState(null);
  const [payMenu, setPayMenu] = useState(null); // { orderN, x, y }
  const [estadoMenu, setEstadoMenu] = useState(null);

  // Build pay-status options relevant to the order's pay method
  const payStatusOptionsFor = (pay) => {
    if (pay === 'boxful') return ['boxful-pending', 'boxful-paid'];
    return [pay]; // transf / efectivo are always paid
  };

  const updatePayStatus = (n, newStatus) => {
    onOrderUpdate(n, { payStatus: newStatus });
    setPayMenu(null);
  };
  const updateEstado = (n, newEstado) => {
    onOrderUpdate(n, { estado: newEstado });
    setEstadoMenu(null);
  };

  // close popover on outside click / esc
  useEffect(() => {
    if (!payMenu && !estadoMenu) return;
    const h = (e) => {
      if (e.key === 'Escape') { setPayMenu(null); setEstadoMenu(null); }
    };
    const c = () => { setPayMenu(null); setEstadoMenu(null); };
    window.addEventListener('keydown', h);
    window.addEventListener('scroll', c, true);
    return () => {
      window.removeEventListener('keydown', h);
      window.removeEventListener('scroll', c, true);
    };
  }, [payMenu, estadoMenu]);

  const filtered = orders.filter(o => {
    if (filters.estado !== 'all' && o.estado !== filters.estado) return false;
    if (filters.pay !== 'all' && o.pay !== filters.pay) return false;
    if (filters.canal !== 'all' && o.canal !== filters.canal) return false;
    if (filters.q && !(`${o.n} ${o.cliente} ${o.ciudad}`.toLowerCase().includes(filters.q.toLowerCase()))) return false;
    if (filters.fecha !== 'all') {
      const now = new Date(); const d = new Date(o.fecha);
      if (filters.fecha === 'hoy') { const t = new Date(); t.setHours(0,0,0,0); if (d < t) return false; }
      else if (filters.fecha === 'semana') { const t = new Date(); t.setDate(t.getDate()-7); if (d < t) return false; }
      else if (filters.fecha === 'mes') { if (d.getFullYear()!==now.getFullYear()||d.getMonth()!==now.getMonth()) return false; }
      else if (filters.fecha === '30d') { const t = new Date(); t.setDate(t.getDate()-30); if (d < t) return false; }
    }
    return true;
  });

  const totalFiltered = filtered.reduce((a, o) => a + o.total, 0);
  const recolectado = filtered.filter(o => !o.payStatus.endsWith('-pending') && o.payStatus !== 'boxful-pending' && !['rebotado','perdido','sin-empezar'].includes(o.estado)).reduce((a, o) => a + o.total, 0);
  const pendienteBoxful = filtered.filter(o => (o.payStatus === 'boxful-pending' || o.payStatus.endsWith('-pending')) && !['rebotado','perdido'].includes(o.estado)).reduce((a, o) => a + o.total, 0);

  return (
    <div>
      <div className="page-head">
        <div>
          <div className="page-kicker">MÓDULO · 02 / VENTAS</div>
          <div className="page-title">Registro de pedidos</div>
          <div className="page-desc">{filtered.length} de {orders.length} pedidos visibles · Total filtrado <span className="mono accent">{L(totalFiltered)}</span></div>
        </div>
        <div style={{ display: 'flex', gap: 10 }}>
          <button className="btn"><Icon name="dl" size={12} /> Excel</button>
          <button className="btn"><Icon name="refresh" size={12} /> Importar reporte Boxful</button>
        </div>
      </div>

      <div className="filterbar">
        <div className="filter-group">
          <Icon name="search" size={13} />
          <input style={{ background: 'transparent', border: 0, color: 'var(--text)', fontFamily: 'var(--font-mono)', fontSize: 12, outline: 'none', width: 180 }} placeholder="# orden o cliente…" value={filters.q} onChange={e => setFilters(f => ({ ...f, q: e.target.value }))} />
        </div>
        <div className="filter-group">
          <span className="flabel">Estado</span>
          <select value={filters.estado} onChange={e => setFilters(f => ({ ...f, estado: e.target.value }))}>
            <option value="all">Todos</option>
            {STATUSES.map(s => <option key={s} value={s}>{STATUS_LABELS[s]}</option>)}
          </select>
        </div>
        <div className="filter-group">
          <span className="flabel">Pago</span>
          <select value={filters.pay} onChange={e => setFilters(f => ({ ...f, pay: e.target.value }))}>
            <option value="all">Todos</option>
            {PAY_METHODS.map(p => <option key={p.id} value={p.id}>{p.label}</option>)}
          </select>
        </div>
        <div className="filter-group">
          <span className="flabel">Canal</span>
          <select value={filters.canal} onChange={e => setFilters(f => ({ ...f, canal: e.target.value }))}>
            <option value="all">Todos</option>
            {CHANNELS.map(c => <option key={c} value={c}>{c}</option>)}
          </select>
        </div>
        <div className="filter-group">
          <span className="flabel">Período</span>
          <select value={filters.fecha} onChange={e => setFilters(f => ({ ...f, fecha: e.target.value }))}>
            <option value="all">Todo</option>
            <option value="hoy">Hoy</option>
            <option value="semana">Última semana</option>
            <option value="mes">Este mes</option>
            <option value="30d">Últimos 30 días</option>
          </select>
        </div>
        {(filters.estado !== 'all' || filters.pay !== 'all' || filters.canal !== 'all' || filters.fecha !== 'all' || filters.q) && (
          <button className="btn sm ghost" onClick={() => setFilters({ estado: 'all', pay: 'all', canal: 'all', fecha: 'all', q: '' })}>
            <Icon name="x" size={11} /> Limpiar
          </button>
        )}
      </div>

      <div className="panel crop" style={{ overflow: 'hidden' }}>
        <div style={{ overflowX: 'auto' }}>
          <table className="tbl">
            <thead>
              <tr>
                <th>Orden</th>
                <th>Cliente</th>
                <th>Canal</th>
                <th>Piezas</th>
                <th style={{ textAlign: 'right' }}>Total</th>
                <th style={{ textAlign: 'right' }}>Comisión</th>
                <th style={{ textAlign: 'right' }}>Ganancia</th>
                <th>Pago</th>
                <th>Estado</th>
                <th>Fecha</th>
                <th></th>
              </tr>
            </thead>
            <tbody>
              {filtered.map(o => {
                const inversion = o.items.reduce((a, i) => {
                  const c = SHIRT_COLORS.find(x => x.id === i.c);
                  const d = i.d === '__none__' ? { cost: 0 } : CATALOG.find(x => x.id === i.d);
                  return a + ((c?.cost || 0) + (d?.cost || 0)) * i.q;
                }, 0);
                const ganancia = o.total - inversion - (o.comision || 0);
                const isSel = selected === o.n;
                return (
                  <tr key={o.n} className={isSel ? 'selected' : ''} onClick={() => setSelected(isSel ? null : o.n)}>
                    <td className="order-n">#{o.n}</td>
                    <td>
                      <div style={{ fontWeight: 500 }}>{o.cliente}</div>
                      <div style={{ fontFamily: 'var(--font-mono)', fontSize: 10, color: 'var(--muted)', letterSpacing: '0.06em' }}>{o.ciudad.toUpperCase()}</div>
                    </td>
                    <td className="mono" style={{ fontSize: 11, color: 'var(--muted)' }}>{o.canal}</td>
                    <td>
                      <div style={{ display: 'flex', alignItems: 'center', gap: 6, flexWrap: 'wrap' }}>
                        {o.items.map((i, idx) => (
                          <span key={idx} className="mono" style={{ fontSize: 10, color: 'var(--muted)', letterSpacing: '0.06em', border: '1px solid var(--line)', padding: '2px 5px' }}>
                            <ColorDot id={i.c} />{i.d} / {i.s}
                          </span>
                        ))}
                      </div>
                    </td>
                    <td className="num">{L(o.total)}</td>
                    <td className="num dim">{o.comision ? '−' + L(o.comision) : '—'}</td>
                    <td className="num" style={{ color: 'var(--ok)', fontWeight: 600 }}>{L(ganancia)}</td>
                    <td onClick={(e) => { e.stopPropagation(); const r = e.currentTarget.getBoundingClientRect(); setEstadoMenu(null); setPayMenu({ orderN: o.n, pay: o.pay, x: r.left, y: r.bottom + 4 }); }}>
                      <span style={{ cursor: 'pointer', display: 'inline-flex', alignItems: 'center', gap: 4 }}>
                        <PayBadge s={o.payStatus} />
                        <Icon name="down" size={10} />
                      </span>
                    </td>
                    <td onClick={(e) => { e.stopPropagation(); const r = e.currentTarget.getBoundingClientRect(); setPayMenu(null); setEstadoMenu({ orderN: o.n, x: r.left, y: r.bottom + 4 }); }}>
                      <span style={{ cursor: 'pointer', display: 'inline-flex', alignItems: 'center', gap: 4 }}>
                        <StatusBadge s={o.estado} />
                        <Icon name="down" size={10} />
                      </span>
                    </td>
                    <td className="mono" style={{ fontSize: 11, color: 'var(--muted)' }}>{o.fecha.slice(5)}</td>
                    <td onClick={e => e.stopPropagation()}>
                      <button
                        onClick={() => onOrderDelete(o.n)}
                        title="Eliminar pedido"
                        style={{ color: 'var(--accent)', fontFamily: 'var(--font-mono)', fontSize: 13, fontWeight: 700, padding: '2px 8px', border: '1px solid #3D1515', background: 'rgba(0,0,0,0.5)', cursor: 'pointer', opacity: 0.7, lineHeight: 1 }}
                        onMouseEnter={e => e.currentTarget.style.opacity = 1}
                        onMouseLeave={e => e.currentTarget.style.opacity = 0.7}
                      >×</button>
                    </td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
        <div className="panel-footer">
          <div className="mono" style={{ fontSize: 11, color: 'var(--muted)', letterSpacing: '0.08em' }}>
            {filtered.length} FILAS
          </div>
          <div style={{ marginLeft: 'auto', display: 'flex', gap: 20, fontFamily: 'var(--font-mono)', fontSize: 11 }}>
            <span className="muted">SUMA TOTAL <span style={{ color: 'var(--text)' }}>{L(totalFiltered)}</span></span>
            <span className="muted">RECOLECTADO <span style={{ color: 'var(--ok)' }}>{L(recolectado)}</span></span>
            <span className="muted">PEND. BOXFUL <span style={{ color: 'var(--warn)' }}>{L(pendienteBoxful)}</span></span>
            <span className="muted">COMISIONES <span style={{ color: 'var(--text)' }}>−{L(filtered.reduce((a, o) => a + (o.comision || 0), 0))}</span></span>
          </div>
        </div>
      </div>

      <PayMenu menu={payMenu} onClose={() => setPayMenu(null)} onPick={(id) => updatePayStatus(payMenu.orderN, id)} />
      <EstadoMenu menu={estadoMenu} onClose={() => setEstadoMenu(null)} onPick={(id) => updateEstado(estadoMenu.orderN, id)} />

      {selected && (() => {
        const o = filtered.find(x => x.n === selected);
        if (!o) return null;
        const inversion = o.items.reduce((a, i) => {
          const c = SHIRT_COLORS.find(x => x.id === i.c);
          const d = i.d === '__none__' ? { cost: 0 } : CATALOG.find(x => x.id === i.d);
          return a + ((c?.cost || 0) + (d?.cost || 0)) * i.q;
        }, 0);
        return (
          <div style={{ marginTop: 20, display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 16 }}>
            <div className="panel crop">
              <div className="panel-head">
                <div className="panel-title">DETALLE · <span className="dim">#{o.n}</span></div>
                <button className="btn sm" style={{ marginLeft: 'auto' }} onClick={() => {
                  const w = window.open('', '_blank', 'width=480,height=640');
                  const ganLoc = o.total - inversion - (o.comision || 0);
                  w.document.write(`<!doctype html><html><head><meta charset="utf-8"><title>Pedido #${o.n}</title><style>
                    body{font-family:monospace;background:#fff;color:#000;padding:24px;font-size:13px;max-width:420px;margin:auto}
                    h2{font-size:20px;font-weight:900;margin:0 0 4px}
                    .sub{color:#666;font-size:11px;margin-bottom:20px}
                    .row{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #eee}
                    .row.big{font-weight:700;font-size:15px;border-bottom:2px solid #000;padding-top:10px}
                    .label{color:#666}
                    hr{border:none;border-top:1px dashed #ccc;margin:16px 0}
                    .item{padding:8px 0;border-bottom:1px solid #f0f0f0}
                    @media print{body{padding:8px}}
                  </style></head><body>
                    <h2>TOONED HN</h2>
                    <div class="sub">Pedido #${o.n} · ${o.fecha} · ${o.canal}</div>
                    <div class="row"><span class="label">Cliente</span><span>${o.cliente}</span></div>
                    <div class="row"><span class="label">Departamento</span><span>${o.ciudad}</span></div>
                    <div class="row"><span class="label">Estado</span><span>${STATUS_LABELS[o.estado] || o.estado}</span></div>
                    <hr/>
                    <div style="font-size:11px;color:#666;font-weight:700;margin-bottom:8px">PIEZAS</div>
                    ${o.items.map(i => { const col=SHIRT_COLORS.find(x=>x.id===i.c); const des=i.d==='__none__'?{name:'Sin diseño'}:CATALOG.find(x=>x.id===i.d); return `<div class="item">${des?.name||'Sin diseño'} · ${col?.name||i.c} · T${i.s} × ${i.q}</div>`; }).join('')}
                    <hr/>
                    <div class="row"><span class="label">Subtotal</span><span>L ${o.total.toLocaleString()}</span></div>
                    <div class="row"><span class="label">Inversión</span><span>L ${inversion.toLocaleString()}</span></div>
                    ${o.comision ? `<div class="row"><span class="label">Comisión</span><span>-L ${o.comision.toLocaleString()}</span></div>` : ''}
                    <div class="row big"><span>GANANCIA</span><span>L ${ganLoc.toLocaleString()}</span></div>
                    <div style="margin-top:24px;font-size:10px;color:#999;text-align:center">TOONED HN · Sistema Operativo Interno</div>
                  </body></html>`);
                  w.document.close();
                  setTimeout(() => w.print(), 300);
                }}>
                  <Icon name="dl" size={11} /> Imprimir
                </button>
              </div>
              <div className="panel-body">
                <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 14 }}>
                  <div><div className="mono" style={{ fontSize: 10, color: 'var(--muted)', letterSpacing: '0.12em' }}>CLIENTE</div><div style={{ fontWeight: 600, marginTop: 4 }}>{o.cliente}</div></div>
                  <div><div className="mono" style={{ fontSize: 10, color: 'var(--muted)', letterSpacing: '0.12em' }}>DEPTO</div><div style={{ fontWeight: 600, marginTop: 4 }}>{o.ciudad}</div></div>
                  <div><div className="mono" style={{ fontSize: 10, color: 'var(--muted)', letterSpacing: '0.12em' }}>CANAL</div><div style={{ fontWeight: 600, marginTop: 4 }}>{o.canal}</div></div>
                  <div><div className="mono" style={{ fontSize: 10, color: 'var(--muted)', letterSpacing: '0.12em' }}>FECHA</div><div style={{ fontWeight: 600, marginTop: 4 }} className="mono">{o.fecha}</div></div>
                </div>
                <hr className="divider" />
                <div className="mono" style={{ fontSize: 10, color: 'var(--muted)', letterSpacing: '0.12em', marginBottom: 8 }}>PIEZAS</div>
                {o.items.map((i, idx) => {
                  const c = SHIRT_COLORS.find(x => x.id === i.c);
                  const d = i.d === '__none__' ? { name: 'Sin diseño', cost: 0 } : CATALOG.find(x => x.id === i.d);
                  return (
                    <div key={idx} style={{ padding: '10px 0', borderBottom: '1px solid var(--line)', display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
                      <div>
                        <div style={{ fontFamily: 'var(--font-display)', fontWeight: 700, fontSize: 13 }}>{d?.name || 'Sin diseño'}</div>
                        <div className="mono" style={{ fontSize: 10, color: 'var(--muted)', letterSpacing: '0.06em', marginTop: 2 }}><ColorDot id={i.c} /> {c?.name.toUpperCase()} · TALLA {i.s} · x{i.q}</div>
                      </div>
                      <div className="mono" style={{ fontSize: 11, color: 'var(--muted)' }}>CAM {L(c?.cost || 0)}{d?.cost > 0 ? ` + DTF ${L(d.cost)}` : ''}</div>
                    </div>
                  );
                })}
              </div>
            </div>
            <div className="panel crop">
              <div className="panel-head"><div className="panel-title">ESTADOS</div></div>
              <div className="panel-body">
                <div className="mono" style={{ fontSize: 10, color: 'var(--muted)', letterSpacing: '0.12em', marginBottom: 8 }}>ESTADO PEDIDO</div>
                <div style={{ display: 'flex', flexWrap: 'wrap', gap: 6 }}>
                  {STATUSES.map(s => (
                    <button key={s} className={`badge ${s}`}
                      onClick={() => updateEstado(o.n, s)}
                      style={{ cursor: 'pointer', opacity: s === o.estado ? 1 : 0.35, padding: '5px 10px', transition: 'opacity 0.15s' }}>
                      <span className="pip" />{STATUS_LABELS[s]}
                    </button>
                  ))}
                </div>
                <hr className="divider" />
                <div className="mono" style={{ fontSize: 10, color: 'var(--muted)', letterSpacing: '0.12em', marginBottom: 8 }}>LIQUIDACIÓN</div>
                <div className="summary-row"><span className="l">Venta</span><span className="r mono">{L(o.total)}</span></div>
                <div className="summary-row"><span className="l">Inversión</span><span className="r mono" style={{ color: 'var(--warn)' }}>−{L(inversion)}</span></div>
                <div className="summary-row"><span className="l">Comisión Boxful</span><span className="r mono" style={{ color: 'var(--warn)' }}>{o.comision ? '−' + L(o.comision) : '—'}</span></div>
                <div className="summary-row big positive"><span className="l">GANANCIA</span><span className="r">{L(o.total - inversion - (o.comision || 0))}</span></div>
              </div>
            </div>
          </div>
        );
      })()}
    </div>
  );
}

// Popover menu for pay/estado edit
function PayMenu({ menu, onPick, onClose }) {
  if (!menu) return null;
  const opts = menu.pay === 'boxful'
    ? [{ id: 'boxful-pending', label: 'Pendiente Boxful', hint: 'No suma a recolectado' },
       { id: 'boxful-paid',    label: 'Pagado vía Boxful', hint: 'Suma a recolectado' }]
    : [{ id: `${menu.pay}-pending`, label: `Pendiente · ${menu.pay.toUpperCase()}`, hint: 'No suma a recolectado' },
       { id: menu.pay,               label: `Pagado · ${menu.pay.toUpperCase()}`,   hint: 'Suma a recolectado' }];
  return (
    <>
      <div onClick={onClose} style={{ position: 'fixed', inset: 0, zIndex: 98 }} />
      <div style={{ position: 'fixed', left: menu.x, top: menu.y, zIndex: 99, background: 'var(--card)', border: '1px solid var(--line-2)', minWidth: 240, boxShadow: '0 12px 40px rgba(0,0,0,0.6)' }}>
        <div style={{ padding: '8px 12px', fontFamily: 'var(--font-mono)', fontSize: 10, letterSpacing: '0.12em', color: 'var(--muted)', textTransform: 'uppercase', borderBottom: '1px solid var(--line)' }}>
          Cambiar estado de pago
        </div>
        {opts.map(o => (
          <button key={o.id} onClick={() => onPick(o.id)} style={{ display: 'block', width: '100%', textAlign: 'left', padding: '10px 12px', borderBottom: '1px solid var(--line)', cursor: 'pointer' }}>
            <div style={{ fontFamily: 'var(--font-display)', fontWeight: 600, fontSize: 12, color: 'var(--text)' }}>{o.label}</div>
            {o.hint && <div style={{ fontFamily: 'var(--font-mono)', fontSize: 10, color: 'var(--muted)', letterSpacing: '0.06em', marginTop: 2 }}>{o.hint}</div>}
          </button>
        ))}
      </div>
    </>
  );
}

function EstadoMenu({ menu, onPick, onClose }) {
  if (!menu) return null;
  return (
    <>
      <div onClick={onClose} style={{ position: 'fixed', inset: 0, zIndex: 98 }} />
      <div style={{ position: 'fixed', left: menu.x, top: menu.y, zIndex: 99, background: 'var(--card)', border: '1px solid var(--line-2)', minWidth: 200, boxShadow: '0 12px 40px rgba(0,0,0,0.6)' }}>
        <div style={{ padding: '8px 12px', fontFamily: 'var(--font-mono)', fontSize: 10, letterSpacing: '0.12em', color: 'var(--muted)', textTransform: 'uppercase', borderBottom: '1px solid var(--line)' }}>
          Estado del pedido
        </div>
        {STATUSES.map(s => (
          <button key={s} onClick={() => onPick(s)} style={{ display: 'flex', alignItems: 'center', width: '100%', textAlign: 'left', padding: '8px 12px', borderBottom: '1px solid var(--line)', cursor: 'pointer' }}>
            <StatusBadge s={s} />
          </button>
        ))}
      </div>
    </>
  );
}

Object.assign(window, { Ventas, PayMenu, EstadoMenu });

</script>
<script type="text/babel">
// Inventario — redesigned for clarity and ease of use
// Stock lives in a flat map: { 'CMO-negro-M': 8, ... }

function makeStockKey(prendaId, colorId, size) {
  return `${prendaId}-${colorId}-${size}`;
}

function seedStock() {
  const s = {};
  PRENDAS.forEach(p => {
    p.colors.forEach(c => {
      const uid = c.uid || c.id;
      p.sizes.forEach(sz => {
        const seed = (p.id.charCodeAt(0) + uid.length + sz.charCodeAt(0)) % 10;
        s[makeStockKey(p.id, uid, sz)] = Math.max(0, 12 - seed * 2 + (sz === 'L' ? 4 : sz === 'M' ? 2 : 0));
      });
    });
  });
  return s;
}

function Inventario({ prendas, setPrendas, dtfSizes, setDtfSizes, stock, addStock, setStockVal, dtfStock, setDtfStock, designs, setDesigns, designCats, setDesignCats, setOrders }) {
  const [tab, setTab] = useState('prendas');

  const totalPrendas = Object.values(stock).reduce((a, v) => a + v, 0);
  const totalDTF = dtfStock.reduce((a, d) => a + d.qty, 0);

  return (
    <div>
      <div className="page-head">
        <div>
          <div className="page-kicker">MÓDULO · 04 / INVENTARIO</div>
          <div className="page-title">Inventario</div>
          <div className="page-desc">
            Ingresá stock directamente en cada celda — usá los botones <strong style={{color:'var(--text)'}}>+ / −</strong> o escribí la cantidad. Los cambios se guardan en tiempo real.
          </div>
        </div>
        <div style={{ display: 'flex', gap: 10 }}>
          <div className="chip">PRENDAS <span className="v mono">{totalPrendas} UDS</span></div>
          <div className="chip">DTF PRE-IMPRESO <span className="v mono">{totalDTF} UDS</span></div>
        </div>
      </div>

      {/* Tab bar */}
      <div style={{ display: 'flex', gap: 0, borderBottom: '2px solid var(--line)', marginBottom: 32 }}>
        {[
          { id: 'prendas', label: 'Prendas en stock', sub: `${totalPrendas} unidades` },
          { id: 'disenos', label: 'Diseños pre-impresos', sub: `${totalDTF} unidades` },
        ].map(t => (
          <button key={t.id} onClick={() => setTab(t.id)} style={{
            padding: '16px 28px', textAlign: 'left',
            borderBottom: tab === t.id ? '2px solid var(--accent)' : '2px solid transparent',
            marginBottom: '-2px',
          }}>
            <div style={{ fontFamily: 'var(--font-display)', fontWeight: 700, fontSize: 15, color: tab === t.id ? 'var(--text)' : 'var(--muted)' }}>{t.label}</div>
            <div className="mono" style={{ fontSize: 10, letterSpacing: '0.1em', color: tab === t.id ? 'var(--accent)' : 'var(--dim)', marginTop: 2 }}>{t.sub}</div>
          </button>
        ))}
      </div>

      {/* Low stock alert */}
      {(() => {
        const LOW = 3;
        const alerts = [];
        prendas.forEach(p => p.colors.forEach(c => {
          const uid = c.uid || c.id;
          const total = p.sizes.reduce((a, sz) => a + (stock[makeStockKey(p.id, uid, sz)] || 0), 0);
          if (total > 0 && total <= LOW) alerts.push(`${p.name} ${c.name}${c.proveedor ? ' ('+c.proveedor+')' : ''}: ${total} ud`);
          else if (total === 0) alerts.push(`${p.name} ${c.name}${c.proveedor ? ' ('+c.proveedor+')' : ''}: AGOTADO`);
        }));
        designs.forEach(d => {
          const total = dtfStock.filter(s => s.design === d.id).reduce((a, s) => a + s.qty, 0);
          if (total > 0 && total <= LOW) alerts.push(`DTF ${d.name}: ${total} ud`);
          else if (total === 0) alerts.push(`DTF ${d.name}: AGOTADO`);
        });
        if (alerts.length === 0) return null;
        return (
          <div style={{ marginBottom: 20, padding: '12px 16px', background: '#1A1200', border: '1px solid var(--warn)', display: 'flex', gap: 14, alignItems: 'flex-start' }}>
            <span style={{ color: 'var(--warn)', fontFamily: 'var(--font-mono)', fontSize: 11, fontWeight: 700, flexShrink: 0, marginTop: 1 }}>⚠ STOCK BAJO</span>
            <div style={{ display: 'flex', flexWrap: 'wrap', gap: '4px 12px' }}>
              {alerts.map((a, i) => (
                <span key={i} className="mono" style={{ fontSize: 10, color: a.includes('AGOTADO') ? 'var(--accent)' : 'var(--warn)', letterSpacing: '0.06em' }}>{a}</span>
              ))}
            </div>
          </div>
        );
      })()}

      {tab === 'prendas' && <PrendasStockTab prendas={prendas} setPrendas={setPrendas} stock={stock} addStock={addStock} setStockVal={setStockVal} />}
      {tab === 'disenos' && <DisenosTab dtfSizes={dtfSizes} setDtfSizes={setDtfSizes} dtfStock={dtfStock} setDtfStock={setDtfStock} designs={designs} setDesigns={setDesigns} designCats={designCats} setDesignCats={setDesignCats} setOrders={setOrders} />}
    </div>
  );
}

// ============================================================
// PRENDAS TAB — big cards with inline stock grid
// ============================================================
// Available base colors for adding to a prenda
const BASE_COLORS = [
  { id: 'negro',   name: 'Negro',         hex: '#0A0A0A', border: '#333' },
  { id: 'blanco',  name: 'Blanco',        hex: '#F1F1F1', border: '#D0D0D0' },
  { id: 'beige',   name: 'Beige',         hex: '#D9CFB8', border: '#B8AE96' },
  { id: 'gris',    name: 'Gris',          hex: '#5A5A5A', border: '#3A3A3A' },
  { id: 'verde',   name: 'Verde Militar', hex: '#3E4A2F', border: '#2A3220' },
  { id: 'navy',    name: 'Azul Navy',     hex: '#1B2A4A', border: '#0D1929' },
  { id: 'rojo',    name: 'Rojo',          hex: '#8B1A1A', border: '#5A0F0F' },
  { id: 'cafe',    name: 'Café',          hex: '#6B4226', border: '#4A2D18' },
];

function PrendasStockTab({ prendas, setPrendas, stock, addStock, setStockVal }) {
  const lowThreshold = 3;
  const [editing, setEditing] = useState(null);
  const [editName, setEditName] = useState({});
  const [showNewCat, setShowNewCat] = useState(false);
  const [newCatId, setNewCatId] = useState('');
  const [newCatName, setNewCatName] = useState('');
  const [newCatSizes, setNewCatSizes] = useState(['S','M','L','XL']);

  const startEditName = (p) => {
    setEditing(p.id);
    setEditName(prev => ({ ...prev, [p.id]: p.name }));
  };

  const renamePrenda = (id) => {
    const newName = (editName[id] || '').trim();
    if (!newName) return;
    setPrendas(prev => prev.map(p => p.id === id ? { ...p, name: newName } : p));
  };

  const deletePrenda = (id) => {
    if (!window.confirm('¿Eliminar esta categoría? Se borrará su stock también.')) return;
    setPrendas(prev => prev.filter(p => p.id !== id));
  };

  const TALLAS_BASE = ['XS','S','M','L','XL','XXL','ÚNICA'];
  const toggleSize = (sz) => setNewCatSizes(prev => prev.includes(sz) ? prev.filter(s => s !== sz) : [...prev, sz]);

  const saveNewCat = () => {
    const id = newCatId.trim().toUpperCase();
    const name = newCatName.trim();
    if (!id || !name || prendas.find(p => p.id === id)) return;
    setPrendas(prev => [...prev, { id, name, tipo: 'camiseta', icon: '👕', sizes: newCatSizes.length ? newCatSizes : ['S','M','L','XL'], colors: [] }]);
    setNewCatId(''); setNewCatName(''); setNewCatSizes(['S','M','L','XL']); setShowNewCat(false);
  };

  const removeColorEntry = (prendaId, uid) => {
    setPrendas(prev => prev.map(p => p.id === prendaId
      ? { ...p, colors: p.colors.filter(c => (c.uid || c.id) !== uid) }
      : p
    ));
  };

  const updateColorField = (prendaId, uid, field, val) => {
    setPrendas(prev => prev.map(p => p.id === prendaId
      ? { ...p, colors: p.colors.map(c => (c.uid || c.id) === uid ? { ...c, [field]: Number(val) || 0 } : c) }
      : p
    ));
  };

  const addColorEntry = (prendaId, entry) => {
    setPrendas(prev => prev.map(p => p.id === prendaId
      ? { ...p, colors: [...p.colors, entry] }
      : p
    ));
  };

  return (
    <div style={{ display: 'flex', flexDirection: 'column', gap: 28 }}>

      {/* Nueva categoría */}
      <div style={{ display: 'flex', justifyContent: 'flex-end', marginBottom: -8 }}>
        <button className="btn primary" style={{ padding: '12px 18px', fontSize: 12 }} onClick={() => setShowNewCat(s => !s)}>
          <Icon name="plus" size={13} /> Nueva categoría
        </button>
      </div>

      {showNewCat && (
        <div style={{ background: 'var(--card)', border: '1px solid var(--accent)', padding: 24 }}>
          <div style={{ fontFamily: 'var(--font-display)', fontWeight: 800, fontSize: 16, marginBottom: 20 }}>Nueva categoría de prenda</div>
          <div style={{ display: 'grid', gridTemplateColumns: '120px 1fr', gap: 16, marginBottom: 20 }}>
            <div className="field">
              <label>Código</label>
              <input className="input mono" placeholder="CMO" maxLength={6}
                value={newCatId} onChange={e => setNewCatId(e.target.value.toUpperCase())} />
            </div>
            <div className="field">
              <label>Nombre de la categoría</label>
              <input className="input" placeholder="Camiseta Oversize"
                value={newCatName} onChange={e => setNewCatName(e.target.value)} />
            </div>
          </div>
          <div className="field" style={{ marginBottom: 20 }}>
            <label>Tallas disponibles</label>
            <div style={{ display: 'flex', gap: 8, flexWrap: 'wrap', marginTop: 6 }}>
              {TALLAS_BASE.map(sz => (
                <button key={sz} type="button"
                  onClick={() => toggleSize(sz)}
                  style={{ fontFamily: 'var(--font-mono)', fontWeight: 700, fontSize: 12, padding: '6px 14px',
                    background: newCatSizes.includes(sz) ? 'var(--accent)' : '#0B0B0B',
                    color: newCatSizes.includes(sz) ? '#0A0A0A' : 'var(--muted)',
                    border: `1px solid ${newCatSizes.includes(sz) ? 'var(--accent)' : 'var(--line)'}`,
                    cursor: 'pointer' }}>
                  {sz}
                </button>
              ))}
            </div>
          </div>
          <div style={{ display: 'flex', gap: 10, justifyContent: 'flex-end' }}>
            <button className="btn ghost" onClick={() => setShowNewCat(false)}>Cancelar</button>
            <button className="btn primary" disabled={!newCatId.trim() || !newCatName.trim()} onClick={saveNewCat}>
              <Icon name="check" size={12} /> Crear categoría
            </button>
          </div>
        </div>
      )}

      {prendas.map(p => {
        const totalForProduct = p.colors.reduce((a, c) => {
          const uid = c.uid || c.id;
          return a + p.sizes.reduce((b, sz) => b + (stock[makeStockKey(p.id, uid, sz)] || 0), 0);
        }, 0);
        const isEditing = editing === p.id;

        return (
          <div key={p.id} style={{
            background: 'var(--card)',
            border: `1px solid ${isEditing ? 'var(--accent)' : 'var(--line)'}`,
            overflow: 'hidden',
            transition: 'border-color 0.15s',
          }}>
            {/* Product header */}
            <div style={{ padding: '24px 28px', borderBottom: '1px solid var(--line)', display: 'flex', alignItems: 'center', gap: 20, background: '#0F0F0F' }}>
              <div style={{ flex: 1 }}>
                <div style={{ display: 'flex', alignItems: 'center', gap: 10, marginBottom: 4 }}>
                  <div className="mono" style={{ fontSize: 10, color: 'var(--accent)', letterSpacing: '0.18em' }}>{p.id}</div>
                  {isEditing && (
                    <button onClick={() => deletePrenda(p.id)}
                      style={{ fontSize: 10, fontFamily: 'var(--font-mono)', color: 'var(--accent)', border: '1px solid #3D1515', background: 'rgba(0,0,0,0.6)', padding: '1px 8px', cursor: 'pointer', letterSpacing: '0.06em' }}>
                      × Eliminar categoría
                    </button>
                  )}
                </div>
                {isEditing ? (
                  <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
                    <input
                      className="input"
                      style={{ fontFamily: 'var(--font-display)', fontWeight: 900, fontSize: 22, letterSpacing: '-0.02em', height: 40, padding: '0 12px', flex: 1, maxWidth: 360 }}
                      value={editName[p.id] ?? p.name}
                      onChange={e => setEditName(prev => ({ ...prev, [p.id]: e.target.value }))}
                      onKeyDown={e => e.key === 'Enter' && renamePrenda(p.id)}
                    />
                    <button className="btn sm primary" onClick={() => renamePrenda(p.id)}>
                      <Icon name="check" size={11} /> Renombrar
                    </button>
                  </div>
                ) : (
                  <div style={{ fontFamily: 'var(--font-display)', fontWeight: 900, fontSize: 28, letterSpacing: '-0.02em', lineHeight: 1 }}>{p.name}</div>
                )}
                <div className="mono" style={{ fontSize: 11, color: 'var(--muted)', letterSpacing: '0.1em', marginTop: 6, textTransform: 'uppercase' }}>
                  {p.colors.length} entradas · {p.sizes.length} tallas
                </div>
              </div>
              <div style={{ display: 'flex', alignItems: 'center', gap: 16 }}>
                <button className={isEditing ? 'btn primary sm' : 'btn sm'} onClick={() => isEditing ? setEditing(null) : startEditName(p)}>
                  {isEditing ? <><Icon name="check" size={11} /> Listo</> : <><Icon name="edit" size={11} /> Editar</>}
                </button>
                <div style={{ textAlign: 'right' }}>
                  <div className="mono" style={{ fontSize: 10, color: 'var(--muted)', letterSpacing: '0.1em', textTransform: 'uppercase' }}>Stock total</div>
                  <div style={{ fontFamily: 'var(--font-display)', fontWeight: 900, fontSize: 56, lineHeight: 1, letterSpacing: '-0.04em', color: totalForProduct < 5 ? 'var(--accent)' : 'var(--text)' }}>{totalForProduct}</div>
                </div>
              </div>
            </div>

            {/* Stock grid */}
            <div style={{ padding: '28px', overflowX: 'auto' }}>
              <table style={{ borderCollapse: 'collapse', width: '100%', minWidth: 420 }}>
                <thead>
                  <tr>
                    <th style={{ padding: '0 0 16px', textAlign: 'left', width: 200 }}>
                      <span className="mono" style={{ fontSize: 10, color: 'var(--muted)', letterSpacing: '0.14em', textTransform: 'uppercase' }}>Color · Proveedor · Costo</span>
                    </th>
                    {p.sizes.map(sz => (
                      <th key={sz} style={{ padding: '0 12px 16px', textAlign: 'center', minWidth: 110 }}>
                        <span style={{ fontFamily: 'var(--font-display)', fontWeight: 800, fontSize: 20 }}>{sz}</span>
                      </th>
                    ))}
                    <th style={{ padding: '0 0 16px 24px', textAlign: 'right', width: 80 }}>
                      <span className="mono" style={{ fontSize: 10, color: 'var(--muted)', letterSpacing: '0.14em', textTransform: 'uppercase' }}>Sub</span>
                    </th>
                  </tr>
                </thead>
                <tbody>
                  {p.colors.map(c => {
                    const uid = c.uid || c.id;
                    const rowTotal = p.sizes.reduce((a, sz) => a + (stock[makeStockKey(p.id, uid, sz)] || 0), 0);
                    return (
                      <tr key={uid} style={{ borderTop: '1px solid var(--line)' }}>
                        {/* Color + proveedor + cost label */}
                        <td style={{ padding: '16px 0' }}>
                          <div style={{ display: 'flex', alignItems: 'flex-start', gap: 10 }}>
                            {isEditing && (
                              <button onClick={() => removeColorEntry(p.id, uid)} title="Eliminar entrada"
                                style={{ color: 'var(--accent)', fontFamily: 'var(--font-mono)', fontSize: 16, padding: '0 2px', flexShrink: 0, marginTop: 2, opacity: p.colors.length <= 1 ? 0.3 : 1 }}
                                disabled={p.colors.length <= 1}>×</button>
                            )}
                            <div style={{ width: 28, height: 28, flexShrink: 0, marginTop: 2, background: c.hex, border: `1px solid ${c.border}` }} />
                            <div>
                              <div style={{ fontFamily: 'var(--font-display)', fontWeight: 700, fontSize: 14 }}>{c.name}</div>
                              {c.proveedor && (
                                <div className="mono" style={{ fontSize: 9, color: 'var(--info)', letterSpacing: '0.1em', textTransform: 'uppercase', marginTop: 1 }}>
                                  {c.proveedor}
                                </div>
                              )}
                              {isEditing ? (
                                <div style={{ display: 'flex', gap: 10, marginTop: 5, flexWrap: 'wrap' }}>
                                  <div style={{ display: 'flex', alignItems: 'center', gap: 4 }}>
                                    <span className="mono" style={{ fontSize: 9, color: 'var(--muted)' }}>Costo L</span>
                                    <input type="number" min="0" value={c.cost}
                                      onChange={e => updateColorField(p.id, uid, 'cost', e.target.value)}
                                      className="mono"
                                      style={{ width: 68, padding: '3px 6px', background: '#0B0B0B', border: '1px solid var(--line)', color: 'var(--text)', fontSize: 11, outline: 'none' }} />
                                  </div>
                                </div>
                              ) : (
                                <div className="mono" style={{ fontSize: 10, letterSpacing: '0.06em', marginTop: 2 }}>
                                  <span style={{ color: 'var(--muted)' }}>L {c.cost} costo</span>
                                </div>
                              )}
                            </div>
                          </div>
                        </td>

                        {/* Size cells */}
                        {p.sizes.map(sz => {
                          const key = makeStockKey(p.id, uid, sz);
                          const val = stock[key] || 0;
                          const low = val > 0 && val <= lowThreshold;
                          return (
                            <td key={sz} style={{ padding: '16px 12px', textAlign: 'center', verticalAlign: 'middle' }}>
                              <StockStepper value={val} low={low}
                                onAdd={() => addStock(key, 1)}
                                onSub={() => addStock(key, -1)}
                                onChange={v => setStockVal(key, v)}
                              />
                            </td>
                          );
                        })}

                        <td style={{ padding: '16px 0 16px 24px', textAlign: 'right', verticalAlign: 'middle' }}>
                          <span style={{ fontFamily: 'var(--font-mono)', fontWeight: 600, fontSize: 18, color: 'var(--muted)' }}>{rowTotal}</span>
                        </td>
                      </tr>
                    );
                  })}
                </tbody>
                <tfoot>
                  <tr style={{ borderTop: '2px solid var(--line-2)' }}>
                    <td style={{ padding: '16px 0 0' }}>
                      <span className="mono" style={{ fontSize: 10, color: 'var(--muted)', letterSpacing: '0.12em', textTransform: 'uppercase' }}>Subtotal por talla</span>
                    </td>
                    {p.sizes.map(sz => {
                      const colTotal = p.colors.reduce((a, c) => a + (stock[makeStockKey(p.id, c.uid || c.id, sz)] || 0), 0);
                      return (
                        <td key={sz} style={{ padding: '16px 12px 0', textAlign: 'center' }}>
                          <span style={{ fontFamily: 'var(--font-mono)', fontWeight: 700, fontSize: 18, color: 'var(--text)' }}>{colTotal}</span>
                        </td>
                      );
                    })}
                    <td style={{ padding: '16px 0 0 24px', textAlign: 'right' }}>
                      <span style={{ fontFamily: 'var(--font-display)', fontWeight: 900, fontSize: 22, color: 'var(--accent)' }}>{totalForProduct}</span>
                    </td>
                  </tr>
                </tfoot>
              </table>

              {isEditing && (
                <AddColorPanel existingColors={p.colors} onAdd={entry => addColorEntry(p.id, entry)} />
              )}

              {(() => {
                const lows = [];
                p.colors.forEach(c => {
                  const uid = c.uid || c.id;
                  p.sizes.forEach(sz => {
                    const v = stock[makeStockKey(p.id, uid, sz)] || 0;
                    if (v > 0 && v <= lowThreshold) {
                      const prov = c.proveedor ? ` (${c.proveedor})` : '';
                      lows.push(`${c.name}${prov} / ${sz}: ${v} uds`);
                    }
                  });
                });
                if (!lows.length) return null;
                return (
                  <div style={{ marginTop: 20, padding: '12px 16px', background: '#1A0A0A', border: '1px solid #3D1515', display: 'flex', alignItems: 'flex-start', gap: 12 }}>
                    <span style={{ color: 'var(--accent)', fontFamily: 'var(--font-mono)', fontSize: 11, fontWeight: 700, marginTop: 1 }}>⚠ BAJO STOCK</span>
                    <span className="mono" style={{ fontSize: 11, color: '#CC6666', letterSpacing: '0.04em' }}>{lows.join(' · ')}</span>
                  </div>
                );
              })()}
            </div>
          </div>
        );
      })}
    </div>
  );
}

function AddColorPanel({ existingColors, onAdd }) {
  const [selected, setSelected] = useState(null);
  const [proveedor, setProveedor] = useState('');
  const [cost, setCost] = useState(215);
  const [error, setError] = useState('');

  const sel = BASE_COLORS.find(c => c.id === selected);

  const handleAdd = () => {
    setError('');
    if (!sel) { setError('Seleccioná un color.'); return; }
    const slug = proveedor.trim().toLowerCase().replace(/\s+/g, '-').replace(/[^a-z0-9-]/g, '');
    const uid = proveedor.trim() ? `${sel.id}-${slug}` : sel.id;
    if (existingColors.some(c => (c.uid || c.id) === uid)) {
      setError('Ya existe una entrada con ese color y proveedor.');
      return;
    }
    onAdd({ ...sel, uid, cost: Number(cost) || 0, proveedor: proveedor.trim() });
    setSelected(null); setProveedor(''); setCost(215); setError('');
  };

  const iStyle = { padding: '9px 11px', background: '#0B0B0B', border: '1px solid var(--line)', color: 'var(--text)', fontSize: 13, outline: 'none', width: '100%', fontFamily: 'var(--font-mono)' };
  const lStyle = { fontFamily: 'var(--font-mono)', fontSize: 9, color: 'var(--dim)', letterSpacing: '0.12em', textTransform: 'uppercase', display: 'block', marginBottom: 6 };

  return (
    <div style={{ marginTop: 20, padding: '20px', background: '#0C0C0C', border: '1px dashed var(--line-2)' }}>
      <div className="mono" style={{ fontSize: 10, color: 'var(--muted)', letterSpacing: '0.14em', textTransform: 'uppercase', marginBottom: 16 }}>
        + Agregar color / proveedor
      </div>
      <div style={{ display: 'grid', gridTemplateColumns: 'auto 1fr 110px auto', gap: 16, alignItems: 'end' }}>
        <div>
          <label style={lStyle}>Color</label>
          <div style={{ display: 'flex', gap: 5, flexWrap: 'wrap', maxWidth: 220 }}>
            {BASE_COLORS.map(c => (
              <button key={c.id} onClick={() => setSelected(c.id)} title={c.name}
                style={{ width: 32, height: 32, background: c.hex, border: `2px solid ${selected === c.id ? 'var(--accent)' : c.border}`, cursor: 'pointer', outline: selected === c.id ? '2px solid var(--accent)' : 'none', outlineOffset: 2 }} />
            ))}
          </div>
          {sel && <div style={{ fontFamily: 'var(--font-display)', fontWeight: 700, fontSize: 11, marginTop: 5 }}>{sel.name}</div>}
        </div>
        <div>
          <label style={lStyle}>Proveedor <span style={{ color: 'var(--dim)', textTransform: 'none', letterSpacing: 0 }}>— diferencia el stock</span></label>
          <input style={iStyle} placeholder="Ej. Importadora XY" value={proveedor} onChange={e => setProveedor(e.target.value)} />
          <div className="mono" style={{ fontSize: 9, color: 'var(--dim)', marginTop: 3 }}>Vacío = sin proveedor</div>
        </div>
        <div>
          <label style={lStyle}>Costo (L)</label>
          <input type="number" min="0" style={iStyle} value={cost} onChange={e => setCost(e.target.value)} />
        </div>
        <button className="btn primary sm" onClick={handleAdd}><Icon name="plus" size={11} /> Agregar</button>
      </div>
      {error && <div className="mono" style={{ fontSize: 11, color: 'var(--danger)', marginTop: 10 }}>{error}</div>}
    </div>
  );
}

// StockStepper — the core inline control
function StockStepper({ value, low, onAdd, onSub, onChange }) {
  const [editing, setEditing] = useState(false);
  const [draft, setDraft] = useState('');
  const inputRef = useRef(null);

  const startEdit = () => {
    setDraft(String(value));
    setEditing(true);
    setTimeout(() => inputRef.current?.select(), 30);
  };

  const commitEdit = () => {
    const n = parseInt(draft, 10);
    if (!isNaN(n)) onChange(n);
    setEditing(false);
  };

  const bgColor = value === 0 ? '#0C0C0C' : low ? '#1A1200' : '#111';
  const numColor = value === 0 ? 'var(--dim)' : low ? 'var(--warn)' : 'var(--text)';

  return (
    <div style={{
      display: 'inline-flex',
      alignItems: 'center',
      gap: 0,
      border: `1px solid ${value === 0 ? 'var(--line)' : low ? '#5c4516' : 'var(--line-2)'}`,
      background: bgColor,
      height: 48,
    }}>
      <button
        onClick={onSub}
        disabled={value === 0}
        style={{
          width: 36, height: '100%', flexShrink: 0,
          fontFamily: 'var(--font-mono)', fontSize: 18, fontWeight: 300,
          color: value === 0 ? 'var(--dim)' : 'var(--muted)',
          cursor: value === 0 ? 'default' : 'pointer',
          borderRight: '1px solid var(--line)',
          display: 'flex', alignItems: 'center', justifyContent: 'center',
          transition: 'color 0.1s, background 0.1s',
        }}
        onMouseEnter={e => { if (value > 0) e.currentTarget.style.color = 'var(--text)'; }}
        onMouseLeave={e => e.currentTarget.style.color = value === 0 ? 'var(--dim)' : 'var(--muted)'}
      >−</button>

      {editing ? (
        <input
          ref={inputRef}
          type="number"
          value={draft}
          onChange={e => setDraft(e.target.value)}
          onBlur={commitEdit}
          onKeyDown={e => { if (e.key === 'Enter') commitEdit(); if (e.key === 'Escape') setEditing(false); }}
          style={{
            width: 52, height: '100%',
            background: '#1A1A1A', border: 0, outline: 'none',
            fontFamily: 'var(--font-mono)', fontSize: 16, fontWeight: 700,
            color: 'var(--text)', textAlign: 'center',
          }}
        />
      ) : (
        <div
          onClick={startEdit}
          title="Click para editar"
          style={{
            width: 52, height: '100%',
            display: 'flex', alignItems: 'center', justifyContent: 'center',
            fontFamily: 'var(--font-mono)', fontWeight: 700, fontSize: 20,
            color: numColor,
            cursor: 'text',
            userSelect: 'none',
          }}
        >{value}</div>
      )}

      <button
        onClick={onAdd}
        style={{
          width: 36, height: '100%', flexShrink: 0,
          fontFamily: 'var(--font-mono)', fontSize: 18, fontWeight: 300,
          color: 'var(--muted)',
          cursor: 'pointer',
          borderLeft: '1px solid var(--line)',
          display: 'flex', alignItems: 'center', justifyContent: 'center',
          transition: 'color 0.1s, background 0.1s',
        }}
        onMouseEnter={e => { e.currentTarget.style.color = 'var(--accent)'; e.currentTarget.style.background = '#1A0A0A'; }}
        onMouseLeave={e => { e.currentTarget.style.color = 'var(--muted)'; e.currentTarget.style.background = 'transparent'; }}
      >+</button>
    </div>
  );
}

// ============================================================
// DISEÑOS TAB — redesigned
// ============================================================
function DisenosTab({ dtfSizes, setDtfSizes, dtfStock, setDtfStock, designs, setDesigns, designCats, setDesignCats, setOrders }) {
  const [showNew, setShowNew] = useState(false);
  const [manageSizes, setManageSizes] = useState(false);
  const [newSize, setNewSize] = useState('');
  const [editingDesign, setEditingDesign] = useState(null);
  const [editMeta, setEditMeta] = useState({});

  const getQty = (designId, size) => dtfStock.find(s => s.design === designId && s.size === size)?.qty || 0;

  const adjustQty = (designId, size, delta) => {
    setDtfStock(prev => {
      const existing = prev.find(s => s.design === designId && s.size === size);
      if (existing) {
        const next = Math.max(0, existing.qty + delta);
        if (next === 0) return prev.filter(s => !(s.design === designId && s.size === size));
        return prev.map(s => s.design === designId && s.size === size ? { ...s, qty: next } : s);
      }
      if (delta > 0) return [...prev, { design: designId, size, qty: delta }];
      return prev;
    });
  };

  const setQtyVal = (designId, size, val) => {
    setDtfStock(prev => {
      const existing = prev.find(s => s.design === designId && s.size === size);
      if (val === 0) return prev.filter(s => !(s.design === designId && s.size === size));
      if (existing) return prev.map(s => s.design === designId && s.size === size ? { ...s, qty: val } : s);
      return [...prev, { design: designId, size, qty: val }];
    });
  };

  const deleteDesign = (id) => {
    setDesigns(prev => prev.filter(d => d.id !== id));
    setDtfStock(prev => prev.filter(s => s.design !== id));
  };

  const startEditing = (d) => {
    setEditingDesign(d.id);
    setEditMeta(prev => ({ ...prev, [d.id]: { id: d.id, name: d.name } }));
  };

  const renameDesign = (oldId) => {
    const meta = editMeta[oldId] || {};
    const newId = (meta.id || '').trim().toUpperCase();
    const newName = (meta.name || '').trim();
    if (!newId || !newName) return;
    setDesigns(prev => prev.map(d => d.id === oldId ? { ...d, id: newId, name: newName } : d));
    setDtfStock(prev => prev.map(s => s.design === oldId ? { ...s, design: newId } : s));
    if (setOrders) setOrders(prev => prev.map(o => ({
      ...o,
      items: o.items?.map(i => i.d === oldId ? { ...i, d: newId } : i)
    })));
    setEditingDesign(null);
    setEditMeta(prev => { const n = { ...prev }; delete n[oldId]; return n; });
  };

  const addSize = () => {
    const v = newSize.trim().toUpperCase();
    if (!v || dtfSizes.includes(v)) return;
    setDtfSizes(prev => [...prev, v]);
    setNewSize('');
  };

  const removeSize = (sz) => {
    if (dtfSizes.length <= 1) return;
    setDtfSizes(prev => prev.filter(s => s !== sz));
    setDtfStock(prev => prev.filter(s => s.size !== sz));
  };

  const updateDesignPricing = (designId, size, field, val) => {
    setDesigns(prev => prev.map(d => d.id === designId
      ? { ...d, pricing: { ...(d.pricing || {}), [size]: { ...(d.pricing?.[size] || {}), [field]: Number(val) || 0 } } }
      : d
    ));
  };

  const saveNewDesign = ({ sku, name, tag, thumb }) => {
    setDesigns(prev => prev.find(x => x.id === sku) ? prev : [...prev, { id: sku, name, tag, thumb: thumb || null }]);
    setShowNew(false);
  };

  const totalUds = dtfStock.reduce((a, s) => a + s.qty, 0);

  return (
    <div>
      {/* Summary strip */}
      <div style={{ display: 'flex', gap: 16, marginBottom: 28, alignItems: 'center', flexWrap: 'wrap' }}>
        <div style={{ flex: 1 }}>
          <div style={{ fontFamily: 'var(--font-display)', fontWeight: 800, fontSize: 42, letterSpacing: '-0.03em', lineHeight: 1 }}>{totalUds}</div>
          <div className="mono" style={{ fontSize: 11, color: 'var(--muted)', letterSpacing: '0.1em', textTransform: 'uppercase', marginTop: 4 }}>Unidades pre-impresas listas para prensar</div>
        </div>
        <button className="btn sm" onClick={() => setManageSizes(m => !m)}>
          <Icon name="sliders" size={11} /> Tamaños DTF
        </button>
        <button className="btn primary" style={{ padding: '14px 20px', fontSize: 12 }} onClick={() => setShowNew(true)}>
          <Icon name="plus" size={13} /> Registrar diseño nuevo
        </button>
      </div>

      {/* Size manager */}
      {manageSizes && (
        <div style={{ marginBottom: 20, padding: '18px 20px', background: 'var(--card)', border: '1px solid var(--accent)' }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: 12, marginBottom: 14 }}>
            <span style={{ fontFamily: 'var(--font-display)', fontWeight: 700, fontSize: 15 }}>Tamaños de impresión DTF</span>
            <button className="btn sm ghost" style={{ marginLeft: 'auto' }} onClick={() => setManageSizes(false)}><Icon name="x" size={11} /></button>
          </div>
          <div style={{ display: 'flex', gap: 8, flexWrap: 'wrap', marginBottom: 14 }}>
            {dtfSizes.map(sz => (
              <div key={sz} style={{ display: 'inline-flex', alignItems: 'center', border: '1px solid var(--line-2)', background: 'var(--surface)' }}>
                <span style={{ fontFamily: 'var(--font-mono)', fontWeight: 700, fontSize: 13, padding: '8px 12px', letterSpacing: '0.04em' }}>{sz}</span>
                <button onClick={() => removeSize(sz)}
                  style={{ padding: '8px 10px', color: 'var(--dim)', fontSize: 14, borderLeft: '1px solid var(--line)', cursor: dtfSizes.length <= 1 ? 'not-allowed' : 'pointer', opacity: dtfSizes.length <= 1 ? 0.3 : 1 }}
                  disabled={dtfSizes.length <= 1}>×</button>
              </div>
            ))}
          </div>
          <div style={{ display: 'flex', gap: 8 }}>
            <input className="input mono" placeholder="Ej. A3+" value={newSize} onChange={e => setNewSize(e.target.value)}
              onKeyDown={e => e.key === 'Enter' && (e.preventDefault(), addSize())}
              style={{ width: 120 }} />
            <button className="btn primary sm" onClick={addSize}><Icon name="plus" size={11} /> Agregar</button>
          </div>
          <div className="mono" style={{ fontSize: 10, color: 'var(--dim)', marginTop: 10, letterSpacing: '0.08em' }}>⚠ Eliminar un tamaño borrará su stock de todos los diseños.</div>
        </div>
      )}

      {showNew && (
        <NewDisenoForm onSave={saveNewDesign} onCancel={() => setShowNew(false)} designCats={designCats} setDesignCats={setDesignCats} />
      )}

      {/* Design cards grid */}
      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fill, minmax(300px, 1fr))', gap: 16 }}>
        {designs.map(d => {
          const designTotal = dtfSizes.reduce((a, sz) => a + getQty(d.id, sz), 0);
          const isEditing = editingDesign === d.id;
          return (
            <div key={d.id} style={{ background: 'var(--card)', border: `1px solid ${isEditing ? 'var(--accent)' : 'var(--line)'}`, overflow: 'hidden' }}>
              <div style={{ aspectRatio: '16/9', background: '#0B0B0B', position: 'relative', borderBottom: '1px solid var(--line)' }}>
                <CatThumb id={d.id} />
                {d.thumb && <img src={d.thumb} alt={d.name} style={{ position: 'absolute', inset: 0, width: '100%', height: '100%', objectFit: 'cover' }} />}
                <button
                  onClick={() => { if (window.confirm(`¿Eliminar "${d.name}" del catálogo?`)) deleteDesign(d.id); }}
                  style={{ position: 'absolute', top: 8, left: 8, background: 'rgba(0,0,0,0.82)', border: '1px solid #3D1515', color: 'var(--accent)', fontFamily: 'var(--font-mono)', fontSize: 10, padding: '3px 8px', cursor: 'pointer', letterSpacing: '0.08em', zIndex: 2 }}>
                  × Eliminar
                </button>
                <div style={{
                  position: 'absolute', top: 10, right: 10,
                  background: designTotal > 0 ? 'var(--accent)' : '#0A0A0A',
                  color: designTotal > 0 ? '#0A0A0A' : 'var(--dim)',
                  border: `1px solid ${designTotal > 0 ? 'var(--accent)' : 'var(--line)'}`,
                  fontFamily: 'var(--font-mono)', fontWeight: 700, fontSize: 12,
                  padding: '4px 10px', letterSpacing: '0.04em',
                }}>{designTotal} UDS</div>
                <div style={{ position: 'absolute', bottom: 0, left: 0, right: 0, padding: '12px 14px', background: 'linear-gradient(transparent, rgba(0,0,0,0.85))' }}>
                  <div style={{ fontFamily: 'var(--font-display)', fontWeight: 800, fontSize: 16, letterSpacing: '-0.01em' }}>{d.name}</div>
                  <div className="mono" style={{ fontSize: 10, color: 'var(--muted)', letterSpacing: '0.08em', marginTop: 2 }}>
                    {d.id} · {d.tag}
                    {d.cost > 0 && <span style={{ color: 'var(--muted)' }}> · L {d.cost} costo</span>}
                  </div>
                </div>
              </div>
              <div style={{ padding: '14px 16px 18px' }}>
                <div style={{ display: 'flex', alignItems: 'center', marginBottom: 12 }}>
                  <div className="mono" style={{ fontSize: 10, color: 'var(--muted)', letterSpacing: '0.14em', textTransform: 'uppercase', flex: 1 }}>Stock por tamaño</div>
                  <button
                    onClick={() => isEditing ? setEditingDesign(null) : startEditing(d)}
                    className="btn sm ghost"
                    style={{ fontSize: 9, padding: '2px 8px', color: isEditing ? 'var(--ok)' : 'var(--muted)' }}>
                    {isEditing ? '✓ Cerrar' : '✎ Editar'}
                  </button>
                </div>
                {isEditing && (
                  <div style={{ marginBottom: 14, padding: '12px 14px', background: '#0B0B0B', border: '1px solid var(--line)', display: 'flex', gap: 10, alignItems: 'flex-end' }}>
                    <div style={{ flex: '0 0 90px' }}>
                      <div className="mono" style={{ fontSize: 9, color: 'var(--muted)', letterSpacing: '0.1em', marginBottom: 4 }}>SKU</div>
                      <input className="input mono" style={{ fontSize: 12, height: 30, padding: '0 8px' }}
                        value={editMeta[d.id]?.id ?? d.id}
                        onChange={e => setEditMeta(prev => ({ ...prev, [d.id]: { ...(prev[d.id] || { id: d.id, name: d.name }), id: e.target.value.toUpperCase() } }))} />
                    </div>
                    <div style={{ flex: 1 }}>
                      <div className="mono" style={{ fontSize: 9, color: 'var(--muted)', letterSpacing: '0.1em', marginBottom: 4 }}>NOMBRE</div>
                      <input className="input" style={{ fontSize: 12, height: 30, padding: '0 8px' }}
                        value={editMeta[d.id]?.name ?? d.name}
                        onChange={e => setEditMeta(prev => ({ ...prev, [d.id]: { ...(prev[d.id] || { id: d.id, name: d.name }), name: e.target.value } }))} />
                    </div>
                    <button className="btn sm primary" style={{ height: 30, fontSize: 10, whiteSpace: 'nowrap' }} onClick={() => renameDesign(d.id)}>
                      Guardar
                    </button>
                  </div>
                )}
                <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
                  {dtfSizes.map(sz => {
                    const qty = getQty(d.id, sz);
                    const pricing = d.pricing?.[sz] || {};
                    return (
                      <div key={sz}>
                        <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
                          <div style={{ width: 38, fontFamily: 'var(--font-mono)', fontWeight: 700, fontSize: 13, color: 'var(--text)', letterSpacing: '0.04em', flexShrink: 0 }}>{sz}</div>
                          <div style={{ flex: 1 }}>
                            <div style={{ height: 6, background: '#111', position: 'relative', overflow: 'hidden' }}>
                              {qty > 0 && <div style={{ position: 'absolute', left: 0, top: 0, bottom: 0, background: 'var(--accent)', width: `${Math.min(100, (qty / 20) * 100)}%`, transition: 'width 0.2s' }} />}
                            </div>
                          </div>
                          <StockStepper value={qty} low={qty > 0 && qty <= 3}
                            onAdd={() => adjustQty(d.id, sz, 1)}
                            onSub={() => adjustQty(d.id, sz, -1)}
                            onChange={v => setQtyVal(d.id, sz, v)} />
                        </div>
                        {isEditing ? (
                          <div style={{ display: 'flex', gap: 8, marginTop: 5, paddingLeft: 48 }}>
                            <div style={{ display: 'flex', alignItems: 'center', gap: 4 }}>
                              <span className="mono" style={{ fontSize: 9, color: 'var(--muted)', whiteSpace: 'nowrap' }}>Costo L</span>
                              <input type="number" min="0" value={pricing.costo || ''}
                                onChange={e => updateDesignPricing(d.id, sz, 'costo', e.target.value)}
                                className="mono"
                                style={{ width: 62, padding: '3px 6px', background: '#0B0B0B', border: '1px solid var(--line)', color: 'var(--text)', fontSize: 11, outline: 'none' }} />
                            </div>
                          </div>
                        ) : (pricing.costo > 0) && (
                          <div className="mono" style={{ fontSize: 10, paddingLeft: 48, marginTop: 3, letterSpacing: '0.04em' }}>
                            <span style={{ color: 'var(--muted)' }}>L {pricing.costo} costo</span>
                          </div>
                        )}
                      </div>
                    );
                  })}
                </div>
                {isEditing && (
                  <div style={{ marginTop: 14, paddingTop: 12, borderTop: '1px solid var(--line)' }}>
                    <div className="mono" style={{ fontSize: 10, color: 'var(--muted)', letterSpacing: '0.1em', textTransform: 'uppercase', marginBottom: 8 }}>Miniatura</div>
                    <div style={{ display: 'flex', gap: 12, alignItems: 'center' }}>
                      <div
                        onClick={() => document.getElementById(`thumb-${d.id}`).click()}
                        style={{ width: 56, height: 56, border: `1px solid ${d.thumb ? 'var(--accent)' : 'var(--line)'}`, background: '#0B0B0B', flexShrink: 0, overflow: 'hidden', position: 'relative', cursor: 'pointer' }}>
                        {d.thumb
                          ? <img src={d.thumb} alt="" style={{ width: '100%', height: '100%', objectFit: 'cover' }} />
                          : <CatThumb id={d.id} />}
                      </div>
                      <div style={{ display: 'flex', flexDirection: 'column', gap: 6 }}>
                        <button className="btn sm" onClick={() => document.getElementById(`thumb-${d.id}`).click()}>
                          <Icon name="plus" size={11} /> {d.thumb ? 'Cambiar imagen' : 'Subir imagen'}
                        </button>
                        {d.thumb && (
                          <button className="btn sm ghost" style={{ fontSize: 10 }}
                            onClick={() => setDesigns(prev => prev.map(x => x.id === d.id ? { ...x, thumb: null } : x))}>
                            × Quitar miniatura
                          </button>
                        )}
                      </div>
                      <input id={`thumb-${d.id}`} type="file" accept="image/*" style={{ display: 'none' }}
                        onChange={e => {
                          const file = e.target.files[0];
                          if (!file) return;
                          const reader = new FileReader();
                          reader.onload = ev => setDesigns(prev => prev.map(x => x.id === d.id ? { ...x, thumb: ev.target.result } : x));
                          reader.readAsDataURL(file);
                          e.target.value = '';
                        }} />
                    </div>
                  </div>
                )}
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

// New design form — simplified
function NewDisenoForm({ onSave, onCancel, designCats = ['JDM','ANIME','STREET','OTRO'], setDesignCats }) {
  const [sku, setSku] = useState('');
  const [name, setName] = useState('');
  const [tag, setTag] = useState(designCats[0] || 'JDM');
  const [catManage, setCatManage] = useState(false);
  const [newCat, setNewCat] = useState('');
  const [thumb, setThumb] = useState(null); // base64 data URL
  const fileRef = useRef(null);

  const handleFile = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => setThumb(ev.target.result);
    reader.readAsDataURL(file);
  };

  const addCat = () => {
    const v = newCat.trim().toUpperCase();
    if (!v || designCats.includes(v)) return;
    setDesignCats(prev => [...prev, v]);
    setTag(v);
    setNewCat('');
  };

  const canSave = sku.trim() && name.trim();

  return (
    <div style={{ background: 'var(--card)', border: '1px solid var(--accent)', marginBottom: 24 }}>
      <div style={{ padding: '20px 24px', borderBottom: '1px solid var(--line)', display: 'flex', alignItems: 'center', gap: 12 }}>
        <div style={{ fontFamily: 'var(--font-display)', fontWeight: 800, fontSize: 18 }}>Registrar diseño nuevo</div>
        <button className="btn sm ghost" style={{ marginLeft: 'auto' }} onClick={onCancel}><Icon name="x" size={12} /></button>
      </div>
      <div style={{ padding: '24px', display: 'grid', gridTemplateColumns: '1fr 1fr 1fr 1fr', gap: 16 }}>
        <div className="field">

<script type="text/babel">
// Clientes module
function Clientes({ clients, setClients, orders }) {
  const [editing, setEditing] = useState(null); // phone being edited, or 'new'
  const [search, setSearch] = useState('');

  const filtered = clients.filter(c =>
    !search ||
    c.phone.toLowerCase().includes(search.toLowerCase()) ||
    c.nombre.toLowerCase().includes(search.toLowerCase())
  );

  const ordersByPhone = useMemo(() => {
    const m = {};
    orders.forEach(o => {
      if (!o.phone) return;
      m[o.phone] = m[o.phone] || { count: 0, total: 0, last: null };
      m[o.phone].count++;
      m[o.phone].total += o.total;
      if (!m[o.phone].last || o.fecha > m[o.phone].last) m[o.phone].last = o.fecha;
    });
    return m;
  }, [orders]);

  const saveClient = (c, original) => {
    if (original) {
      setClients(prev => prev.map(x => x.phone === original ? c : x));
    } else {
      if (clients.some(x => x.phone === c.phone)) { alert('Ya existe cliente con ese teléfono'); return; }
      setClients(prev => [{ ...c, creado: new Date().toISOString().slice(0,10) }, ...prev]);
    }
    setEditing(null);
  };

  return (
